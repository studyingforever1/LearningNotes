<svg viewBox="0 0 960 660" xmlns="http://www.w3.org/2000/svg" font-family="'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2980b9"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#27ae60"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e67e22"/>
    </marker>
  </defs>

  <rect width="960" height="660" fill="#f8f9fa" rx="8"/>

  <!-- 标题 -->
  <rect x="0" y="0" width="960" height="50" fill="#2c3e50" rx="8"/>
  <rect x="0" y="40" width="960" height="10" fill="#2c3e50"/>
  <text x="480" y="32" text-anchor="middle" fill="white" font-size="20" font-weight="bold">RocketMQ 整体架构：四大核心组件</text>

  <!-- NameServer 集群 -->
  <rect x="320" y="80" width="320" height="120" rx="10" fill="#fef9e7" stroke="#f1c40f" stroke-width="2"/>
  <text x="480" y="106" text-anchor="middle" font-size="14" font-weight="bold" fill="#7d6608">NameServer 集群（无状态，节点互不通信）</text>
  <rect x="340" y="120" width="80" height="60" rx="6" fill="#f9e79f" stroke="#d4ac0d"/>
  <text x="380" y="145" text-anchor="middle" font-size="12" fill="#7d6608" font-weight="bold">NS-1</text>
  <text x="380" y="165" text-anchor="middle" font-size="10" fill="#7d6608">路由注册中心</text>
  <rect x="440" y="120" width="80" height="60" rx="6" fill="#f9e79f" stroke="#d4ac0d"/>
  <text x="480" y="145" text-anchor="middle" font-size="12" fill="#7d6608" font-weight="bold">NS-2</text>
  <text x="480" y="165" text-anchor="middle" font-size="10" fill="#7d6608">路由注册中心</text>
  <rect x="540" y="120" width="80" height="60" rx="6" fill="#f9e79f" stroke="#d4ac0d"/>
  <text x="580" y="145" text-anchor="middle" font-size="12" fill="#7d6608" font-weight="bold">NS-3</text>
  <text x="580" y="165" text-anchor="middle" font-size="10" fill="#7d6608">路由注册中心</text>

  <!-- Broker 集群 -->
  <rect x="280" y="280" width="400" height="240" rx="10" fill="#ecf0f1" stroke="#7f8c8d" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="480" y="304" text-anchor="middle" font-size="14" font-weight="bold" fill="#566573">Broker 集群（主从结构，有状态）</text>

  <!-- Broker Group A -->
  <rect x="300" y="320" width="170" height="180" rx="8" fill="#fff" stroke="#bdc3c7"/>
  <text x="385" y="340" text-anchor="middle" font-size="12" fill="#566573" font-weight="bold">broker-a Group</text>
  <rect x="315" y="350" width="140" height="50" rx="6" fill="#3498db" stroke="#2874a6"/>
  <text x="385" y="370" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Master (id=0)</text>
  <text x="385" y="388" text-anchor="middle" fill="white" font-size="10">可读可写</text>
  <line x1="385" y1="405" x2="385" y2="430" stroke="#2980b9" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="395" y="422" font-size="9" fill="#2980b9">同步/异步复制</text>
  <rect x="315" y="435" width="140" height="50" rx="6" fill="#aed6f1" stroke="#5499c7"/>
  <text x="385" y="455" text-anchor="middle" fill="#1b4f72" font-size="12" font-weight="bold">Slave (id&gt;0)</text>
  <text x="385" y="473" text-anchor="middle" fill="#1b4f72" font-size="10">只读</text>

  <!-- Broker Group B -->
  <rect x="490" y="320" width="170" height="180" rx="8" fill="#fff" stroke="#bdc3c7"/>
  <text x="575" y="340" text-anchor="middle" font-size="12" fill="#566573" font-weight="bold">broker-b Group</text>
  <rect x="505" y="350" width="140" height="50" rx="6" fill="#3498db" stroke="#2874a6"/>
  <text x="575" y="370" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Master (id=0)</text>
  <text x="575" y="388" text-anchor="middle" fill="white" font-size="10">可读可写</text>
  <line x1="575" y1="405" x2="575" y2="430" stroke="#2980b9" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <rect x="505" y="435" width="140" height="50" rx="6" fill="#aed6f1" stroke="#5499c7"/>
  <text x="575" y="455" text-anchor="middle" fill="#1b4f72" font-size="12" font-weight="bold">Slave (id&gt;0)</text>
  <text x="575" y="473" text-anchor="middle" fill="#1b4f72" font-size="10">只读</text>

  <!-- Producer -->
  <rect x="40" y="350" width="160" height="100" rx="10" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="120" y="378" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Producer</text>
  <text x="120" y="398" text-anchor="middle" fill="white" font-size="11">消息生产者</text>
  <text x="120" y="418" text-anchor="middle" fill="white" font-size="10" opacity="0.9">无状态 / 按 Topic 路由</text>
  <text x="120" y="436" text-anchor="middle" fill="#f1c40f" font-size="10">同步 / 异步 / 单向</text>

  <!-- Consumer -->
  <rect x="760" y="350" width="160" height="100" rx="10" fill="#8e44ad" stroke="#6c3483" stroke-width="2"/>
  <text x="840" y="378" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Consumer</text>
  <text x="840" y="398" text-anchor="middle" fill="white" font-size="11">消息消费者</text>
  <text x="840" y="418" text-anchor="middle" fill="white" font-size="10" opacity="0.9">长轮询 Pull / offset 存 Broker</text>
  <text x="840" y="436" text-anchor="middle" fill="#f1c40f" font-size="10">Cluster / Broadcast</text>

  <!-- 注册路由：Broker → NameServer -->
  <line x1="385" y1="320" x2="385" y2="200" stroke="#e67e22" stroke-width="2" marker-end="url(#arrow-orange)" stroke-dasharray="4,3"/>
  <text x="320" y="260" font-size="11" fill="#a04000" font-weight="bold">① 注册路由</text>
  <text x="320" y="274" font-size="10" fill="#a04000">每 30s 心跳</text>

  <line x1="575" y1="320" x2="575" y2="200" stroke="#e67e22" stroke-width="2" marker-end="url(#arrow-orange)" stroke-dasharray="4,3"/>

  <!-- 拉取路由：Producer/Consumer → NameServer -->
  <line x1="200" y1="370" x2="335" y2="200" stroke="#27ae60" stroke-width="2" marker-end="url(#arrow-green)" stroke-dasharray="4,3"/>
  <text x="215" y="280" font-size="11" fill="#1e8449" font-weight="bold">② 拉取路由</text>
  <text x="215" y="294" font-size="10" fill="#1e8449">每 30s</text>

  <line x1="760" y1="370" x2="625" y2="200" stroke="#27ae60" stroke-width="2" marker-end="url(#arrow-green)" stroke-dasharray="4,3"/>

  <!-- 发送消息：Producer → Broker Master -->
  <line x1="200" y1="395" x2="295" y2="395" stroke="#2980b9" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="210" y="385" font-size="11" fill="#1b4f72" font-weight="bold">③ 发送消息</text>

  <!-- 拉取消息：Consumer → Broker -->
  <line x1="760" y1="395" x2="665" y2="395" stroke="#8e44ad" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="680" y="385" font-size="11" fill="#6c3483" font-weight="bold">④ 长轮询拉取</text>

  <!-- 说明区 -->
  <g transform="translate(40, 540)">
    <rect x="0" y="0" width="880" height="100" fill="#fff" stroke="#bdc3c7" rx="6"/>
    <text x="14" y="22" font-size="13" font-weight="bold" fill="#2c3e50">关键流程</text>
    <text x="14" y="44" font-size="11" fill="#333">① <tspan font-weight="bold" fill="#a04000">Broker</tspan> 启动时及每 30s 向<tspan font-weight="bold">所有 NameServer</tspan> 注册自己（BrokerName/Master/Slave/Topic 信息）；NameServer 节点之间互不通信</text>
    <text x="14" y="64" font-size="11" fill="#333">② <tspan font-weight="bold" fill="#1e8449">Producer / Consumer</tspan> 每 30s 从<tspan font-weight="bold">任意一台 NameServer</tspan> 拉取 Topic 路由（哪个 Broker 持有哪些 Queue）</text>
    <text x="14" y="84" font-size="11" fill="#333">③④ 消息走 <tspan font-weight="bold" fill="#1b4f72">Master Broker</tspan>；Master 挂掉后 DLedger / Controller 自动选主（4.5+）</text>
  </g>
</svg>
