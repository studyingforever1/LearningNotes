<svg xmlns="http://www.w3.org/2000/svg" width="480" height="780" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrow-up" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#27ae60"/>
    </marker>
    <marker id="arrow-down" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
  </defs>

  <rect width="480" height="780" fill="#f8f9fa" rx="12"/>
  <text x="240" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">进程虚拟内存布局 (64位)</text>
  <text x="240" y="54" text-anchor="middle" font-size="12" fill="#666">x86_64 · 低地址在上</text>

  <!-- 地址轴标签 -->
  <text x="30" y="84" font-size="10" fill="#999">高地址</text>
  <text x="30" y="740" font-size="10" fill="#999">低地址</text>

  <!-- 内核空间 -->
  <rect x="70" y="68" width="300" height="55" rx="6" fill="#2c3e50" stroke="#1a252f" stroke-width="1.5"/>
  <text x="220" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#ecf0f1">内核空间</text>
  <text x="220" y="108" text-anchor="middle" font-size="10" fill="#95a5a6">0xFFFF800000000000 ~ 0xFFFFFFFFFFFFFFFF</text>
  <text x="390" y="97" font-size="10" fill="#888">128 TB</text>

  <!-- 保留/禁止区 -->
  <rect x="70" y="130" width="300" height="30" rx="4" fill="#bdc3c7" stroke="#95a5a6" stroke-width="1"/>
  <text x="220" y="149" text-anchor="middle" font-size="11" fill="#555">非规范地址区域（禁止访问）</text>

  <!-- 栈 -->
  <rect x="70" y="168" width="300" height="80" rx="6" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5"/>
  <text x="220" y="192" text-anchor="middle" font-size="13" font-weight="bold" fill="white">栈 (Stack)</text>
  <text x="220" y="210" text-anchor="middle" font-size="11" fill="#ffc8c8">局部变量 / 函数调用帧</text>
  <text x="220" y="228" text-anchor="middle" font-size="10" fill="#ffaaaa">默认 8MB，有 guard page 保护</text>
  <text x="395" y="210" font-size="18" fill="#e74c3c">↓</text>
  <text x="392" y="228" font-size="10" fill="#e74c3c">增长</text>

  <!-- 栈底地址 -->
  <line x1="70" y1="248" x2="370" y2="248" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="378" y="252" font-size="10" fill="#999">0x7FFF…</text>

  <!-- mmap区 -->
  <rect x="70" y="256" width="300" height="90" rx="6" fill="#9b59b6" stroke="#6c3483" stroke-width="1.5"/>
  <text x="220" y="278" text-anchor="middle" font-size="13" font-weight="bold" fill="white">mmap 映射区</text>
  <text x="220" y="297" text-anchor="middle" font-size="11" fill="#e8c8ff">共享库 (.so)</text>
  <text x="220" y="314" text-anchor="middle" font-size="11" fill="#e8c8ff">文件内存映射 / 匿名映射</text>
  <text x="220" y="331" text-anchor="middle" font-size="10" fill="#d4aaff">mmap() / munmap() 管理</text>
  <text x="395" y="300" font-size="18" fill="#9b59b6">↓</text>
  <text x="392" y="318" font-size="10" fill="#9b59b6">增长</text>

  <!-- 空白空间 -->
  <rect x="70" y="354" width="300" height="50" rx="4" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="220" y="383" text-anchor="middle" font-size="12" fill="#aaa">… 大片未映射空间 …</text>

  <!-- 堆 -->
  <rect x="70" y="412" width="300" height="90" rx="6" fill="#27ae60" stroke="#1a7a42" stroke-width="1.5"/>
  <text x="220" y="434" text-anchor="middle" font-size="13" font-weight="bold" fill="white">堆 (Heap)</text>
  <text x="220" y="454" text-anchor="middle" font-size="11" fill="#c8f5d8">malloc / new 动态分配</text>
  <text x="220" y="472" text-anchor="middle" font-size="11" fill="#c8f5d8">brk / sbrk 控制边界</text>
  <text x="220" y="490" text-anchor="middle" font-size="10" fill="#a8e8be">glibc ptmalloc / jemalloc / tcmalloc</text>
  <text x="395" y="450" font-size="18" fill="#27ae60">↑</text>
  <text x="392" y="468" font-size="10" fill="#27ae60">增长</text>

  <!-- brk指针 -->
  <line x1="70" y1="502" x2="370" y2="502" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="378" y="506" font-size="10" fill="#27ae60">brk</text>

  <!-- BSS段 -->
  <rect x="70" y="510" width="300" height="55" rx="6" fill="#f39c12" stroke="#d68910" stroke-width="1.5"/>
  <text x="220" y="532" text-anchor="middle" font-size="13" font-weight="bold" fill="white">BSS 段</text>
  <text x="220" y="551" text-anchor="middle" font-size="11" fill="#fff3cc">未初始化全局/静态变量（全零）</text>
  <text x="378" y="540" font-size="10" fill="#f39c12">rw-</text>

  <!-- Data段 -->
  <rect x="70" y="573" width="300" height="55" rx="6" fill="#e67e22" stroke="#ca6f1e" stroke-width="1.5"/>
  <text x="220" y="595" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Data 段</text>
  <text x="220" y="614" text-anchor="middle" font-size="11" fill="#ffe8cc">已初始化全局/静态变量</text>
  <text x="378" y="602" font-size="10" fill="#e67e22">rw-</text>

  <!-- Text段 -->
  <rect x="70" y="636" width="300" height="65" rx="6" fill="#2980b9" stroke="#1a5276" stroke-width="1.5"/>
  <text x="220" y="660" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Text 段（代码段）</text>
  <text x="220" y="679" text-anchor="middle" font-size="11" fill="#d0e8ff">程序指令（只读、可执行）</text>
  <text x="220" y="696" text-anchor="middle" font-size="10" fill="#b0d4f8">多进程可共享同一物理页</text>
  <text x="378" y="670" font-size="10" fill="#2980b9">r-x</text>

  <!-- 保留低地址 -->
  <rect x="70" y="709" width="300" height="35" rx="4" fill="#bdc3c7" stroke="#95a5a6" stroke-width="1"/>
  <text x="220" y="730" text-anchor="middle" font-size="11" fill="#555">保留区域（NULL 陷阱）0x0~0x400000</text>

  <!-- 分隔线 -->
  <line x1="70" y1="162" x2="370" y2="162" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- 图例 -->
  <rect x="50" y="752" width="12" height="12" fill="#e74c3c" rx="2"/>
  <text x="67" y="762" font-size="10" fill="#555">运行时动态</text>
  <rect x="145" y="752" width="12" height="12" fill="#2980b9" rx="2"/>
  <text x="162" y="762" font-size="10" fill="#555">编译时确定</text>
  <rect x="240" y="752" width="12" height="12" fill="#2c3e50" rx="2"/>
  <text x="257" y="762" font-size="10" fill="#555">内核共享</text>
  <rect x="320" y="752" width="12" height="12" fill="#9b59b6" rx="2"/>
  <text x="337" y="762" font-size="10" fill="#555">懒映射</text>
</svg>
