<svg viewBox="0 0 980 700" xmlns="http://www.w3.org/2000/svg" font-family="'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#27ae60"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8e44ad"/>
    </marker>
  </defs>

  <rect width="980" height="700" fill="#f8f9fa" rx="8"/>
  <rect x="0" y="0" width="980" height="50" fill="#2c3e50" rx="8"/>
  <rect x="0" y="40" width="980" height="10" fill="#2c3e50"/>
  <text x="490" y="32" text-anchor="middle" fill="white" font-size="20" font-weight="bold">Young GC 流程（Evacuation Pause）</text>

  <!-- 触发条件 -->
  <rect x="20" y="70" width="940" height="44" fill="#fef9e7" stroke="#f1c40f" stroke-width="1.5" rx="6"/>
  <text x="490" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#7d6608">触发条件：Eden 用尽 + 无 Free Region 可分配为新 Eden</text>
  <text x="490" y="108" text-anchor="middle" font-size="12" fill="#555">全程 STW，多线程并行，是 G1 最频繁的回收类型</text>

  <!-- ============ 阶段流程 ============ -->
  <!-- 阶段标题 -->
  <text x="490" y="140" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">五阶段执行</text>

  <!-- 阶段框 -->
  <g font-size="12">
    <!-- 1 -->
    <rect x="30" y="158" width="170" height="100" rx="6" fill="#d6eaff" stroke="#3498db" stroke-width="2"/>
    <text x="115" y="180" text-anchor="middle" font-weight="bold" fill="#1f618d">① 选定 CSet</text>
    <text x="40" y="202" fill="#333">Collection Set =</text>
    <text x="40" y="218" fill="#333">全部 Young Region</text>
    <text x="40" y="234" fill="#333">（Eden + Survivor）</text>
    <text x="40" y="250" fill="#888" font-size="11">不含 Old</text>

    <line x1="200" y1="208" x2="226" y2="208" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- 2 -->
    <rect x="230" y="158" width="170" height="100" rx="6" fill="#fff3cd" stroke="#e67e22" stroke-width="2"/>
    <text x="315" y="180" text-anchor="middle" font-weight="bold" fill="#a04000">② Root 扫描</text>
    <text x="240" y="202" fill="#333">扫描 GC Roots：</text>
    <text x="240" y="218" fill="#333">• 线程栈、寄存器</text>
    <text x="240" y="234" fill="#333">• 静态变量、JNI</text>
    <text x="240" y="250" fill="#333">• Old → Young RSet</text>

    <line x1="400" y1="208" x2="426" y2="208" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- 3 -->
    <rect x="430" y="158" width="170" height="100" rx="6" fill="#fadbd8" stroke="#e74c3c" stroke-width="2"/>
    <text x="515" y="180" text-anchor="middle" font-weight="bold" fill="#922b21">③ 更新 RSet</text>
    <text x="440" y="202" fill="#333">消费 Dirty Card</text>
    <text x="440" y="218" fill="#333">Queue 剩余卡片</text>
    <text x="440" y="234" fill="#333">确保 RSet 完整</text>
    <text x="440" y="250" fill="#888" font-size="11">阶段开销大</text>

    <line x1="600" y1="208" x2="626" y2="208" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- 4 -->
    <rect x="630" y="158" width="170" height="100" rx="6" fill="#d5f5e3" stroke="#27ae60" stroke-width="2"/>
    <text x="715" y="180" text-anchor="middle" font-weight="bold" fill="#1e8449">④ 复制存活对象</text>
    <text x="640" y="202" fill="#333">CSet 活对象复制到：</text>
    <text x="640" y="218" fill="#333">• 新 Survivor Region</text>
    <text x="640" y="234" fill="#333">• age 达阈值 → Old</text>
    <text x="640" y="250" fill="#888" font-size="11">forwarding pointer</text>

    <line x1="800" y1="208" x2="826" y2="208" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- 5 -->
    <rect x="830" y="158" width="120" height="100" rx="6" fill="#ecf0f1" stroke="#7f8c8d" stroke-width="2"/>
    <text x="890" y="180" text-anchor="middle" font-weight="bold" fill="#555">⑤ 收尾</text>
    <text x="840" y="202" fill="#333">原 CSet Region</text>
    <text x="840" y="218" fill="#333">全部清空 → Free</text>
    <text x="840" y="234" fill="#333">修复引用</text>
    <text x="840" y="250" fill="#333">重建 RSet</text>
  </g>

  <!-- ============ 内存示意图 ============ -->
  <text x="490" y="294" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">Region 状态变化</text>

  <!-- GC 前 -->
  <text x="160" y="320" text-anchor="middle" font-size="13" font-weight="bold" fill="#555">GC 前</text>
  <g transform="translate(30, 332)" font-size="11" text-anchor="middle">
    <rect x="0"   y="0" width="62" height="40" fill="#d6eaff" stroke="#3498db"/><text x="31" y="24" fill="#2980b9">Eden</text>
    <rect x="65"  y="0" width="62" height="40" fill="#d6eaff" stroke="#3498db"/><text x="96" y="24" fill="#2980b9">Eden</text>
    <rect x="130" y="0" width="62" height="40" fill="#d6eaff" stroke="#3498db"/><text x="161" y="24" fill="#2980b9">Eden</text>
    <rect x="195" y="0" width="62" height="40" fill="#fff3cd" stroke="#e67e22"/><text x="226" y="24" fill="#a04000">S0</text>
    <rect x="0"   y="44" width="62" height="40" fill="#e8d6f5" stroke="#8e44ad"/><text x="31" y="68" fill="#6c3483">Old</text>
    <rect x="65"  y="44" width="62" height="40" fill="#e8d6f5" stroke="#8e44ad"/><text x="96" y="68" fill="#6c3483">Old</text>
    <rect x="130" y="44" width="62" height="40" fill="#ecf0f1" stroke="#95a5a6"/><text x="161" y="68" fill="#7f8c8d">Free</text>
    <rect x="195" y="44" width="62" height="40" fill="#ecf0f1" stroke="#95a5a6"/><text x="226" y="68" fill="#7f8c8d">Free</text>
  </g>

  <!-- 箭头 -->
  <text x="345" y="380" font-size="22" fill="#2c3e50">⟶</text>
  <text x="345" y="402" font-size="11" fill="#888">复制存活</text>

  <!-- GC 中 -->
  <text x="490" y="320" text-anchor="middle" font-size="13" font-weight="bold" fill="#555">复制过程</text>
  <g transform="translate(370, 332)" font-size="10" text-anchor="middle">
    <rect x="0"   y="0" width="240" height="40" fill="#fdecea" stroke="#e74c3c" stroke-dasharray="4,3"/>
    <text x="120" y="24" fill="#922b21">CSet：所有 Young Region</text>

    <rect x="0"   y="44" width="60" height="40" fill="#e8d6f5" stroke="#8e44ad"/><text x="30" y="68" fill="#6c3483">Old</text>
    <rect x="62"  y="44" width="60" height="40" fill="#fff3cd" stroke="#e67e22"/><text x="92" y="68" fill="#a04000">新 S1</text>
    <rect x="124" y="44" width="60" height="40" fill="#e8d6f5" stroke="#8e44ad"/><text x="154" y="68" fill="#6c3483">晋升 Old</text>
    <rect x="186" y="44" width="54" height="40" fill="#ecf0f1" stroke="#95a5a6"/><text x="213" y="68" fill="#7f8c8d">Free</text>
  </g>

  <text x="665" y="380" font-size="22" fill="#2c3e50">⟶</text>
  <text x="665" y="402" font-size="11" fill="#888">CSet 全清空</text>

  <!-- GC 后 -->
  <text x="830" y="320" text-anchor="middle" font-size="13" font-weight="bold" fill="#555">GC 后</text>
  <g transform="translate(700, 332)" font-size="11" text-anchor="middle">
    <rect x="0"   y="0" width="62" height="40" fill="#ecf0f1" stroke="#95a5a6"/><text x="31" y="24" fill="#7f8c8d">Free</text>
    <rect x="65"  y="0" width="62" height="40" fill="#ecf0f1" stroke="#95a5a6"/><text x="96" y="24" fill="#7f8c8d">Free</text>
    <rect x="130" y="0" width="62" height="40" fill="#ecf0f1" stroke="#95a5a6"/><text x="161" y="24" fill="#7f8c8d">Free</text>
    <rect x="195" y="0" width="62" height="40" fill="#fff3cd" stroke="#e67e22"/><text x="226" y="24" fill="#a04000">S1</text>
    <rect x="0"   y="44" width="62" height="40" fill="#e8d6f5" stroke="#8e44ad"/><text x="31" y="68" fill="#6c3483">Old</text>
    <rect x="65"  y="44" width="62" height="40" fill="#e8d6f5" stroke="#8e44ad"/><text x="96" y="68" fill="#6c3483">Old</text>
    <rect x="130" y="44" width="62" height="40" fill="#e8d6f5" stroke="#8e44ad"/><text x="161" y="68" fill="#6c3483">Old↑</text>
    <rect x="195" y="44" width="62" height="40" fill="#ecf0f1" stroke="#95a5a6"/><text x="226" y="68" fill="#7f8c8d">Free</text>
  </g>

  <!-- ============ 晋升规则 ============ -->
  <g transform="translate(20, 460)">
    <rect x="0" y="0" width="460" height="220" fill="#eaf2f8" stroke="#3498db" stroke-width="1.5" rx="6"/>
    <text x="230" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#1f618d">对象晋升规则</text>

    <text x="14" y="46" font-size="12" font-weight="bold" fill="#333">① 年龄达阈值</text>
    <text x="14" y="64" font-size="11" fill="#555">每次 Young GC 存活则 age++；age ≥ MaxTenuringThreshold（默认 15）晋升 Old</text>

    <text x="14" y="88" font-size="12" font-weight="bold" fill="#333">② 动态年龄判定</text>
    <text x="14" y="106" font-size="11" fill="#555">Survivor 中累计某个 age 的对象超过 50%，则该 age 及以上全部晋升</text>

    <text x="14" y="130" font-size="12" font-weight="bold" fill="#333">③ Survivor 装不下</text>
    <text x="14" y="148" font-size="11" fill="#555">大对象或 Survivor 空间不足，直接晋升 Old（Allocation Failure）</text>

    <text x="14" y="172" font-size="12" font-weight="bold" fill="#333">④ 大对象</text>
    <text x="14" y="190" font-size="11" fill="#555">分配时 ≥ Region 一半 → 直接 Humongous（不经历年轻代）</text>

    <text x="14" y="210" font-size="11" fill="#888">关键参数：-XX:MaxTenuringThreshold=15, -XX:TargetSurvivorRatio=50</text>
  </g>

  <!-- ============ 停顿时间预测 ============ -->
  <g transform="translate(500, 460)">
    <rect x="0" y="0" width="460" height="220" fill="#fef9e7" stroke="#f1c40f" stroke-width="1.5" rx="6"/>
    <text x="230" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#7d6608">停顿时间预测模型</text>

    <text x="14" y="46" font-size="12" font-weight="bold" fill="#333">如何控制 STW 不超 MaxGCPauseMillis ?</text>

    <text x="14" y="70" font-size="11" fill="#555">• G1 为每个 Region 维护历史统计：</text>
    <text x="30" y="86" font-size="11" fill="#555">- 单位字节复制耗时</text>
    <text x="30" y="102" font-size="11" fill="#555">- RSet 扫描成本</text>
    <text x="30" y="118" font-size="11" fill="#555">- 卡片更新数量</text>

    <text x="14" y="142" font-size="11" fill="#555">• 预测公式：pause ≈ Σ(region.live_bytes × copy_cost) + RSet 处理</text>

    <text x="14" y="166" font-size="11" fill="#555">• Young GC 通过<tspan font-weight="bold" fill="#c0392b">动态调整年轻代大小</tspan>来逼近目标停顿</text>

    <text x="14" y="190" font-size="11" fill="#555">• Mixed GC 通过<tspan font-weight="bold" fill="#c0392b">挑选 Old Region 数量</tspan>来逼近目标停顿</text>

    <text x="14" y="210" font-size="11" fill="#888">注意：MaxGCPauseMillis 是软目标，不是硬保证</text>
  </g>
</svg>
