<svg viewBox="0 0 860 400" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
    <filter id="sh" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
  </defs>

  <rect width="860" height="400" fill="#f8f9fa" rx="12"/>
  <text x="430" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">高可用方案选型决策树</text>

  <!-- Root question -->
  <rect x="310" y="55" width="240" height="45" rx="8" fill="#2c3e50" filter="url(#sh)"/>
  <text x="430" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="white">需要 Redis 高可用？</text>
  <text x="430" y="94" text-anchor="middle" font-size="11" fill="#95a5a6">从这里开始选型</text>

  <!-- Q1 -->
  <line x1="430" y1="100" x2="430" y2="125" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="290" y="125" width="280" height="45" rx="8" fill="#f39c12" filter="url(#sh)"/>
  <text x="430" y="147" text-anchor="middle" font-size="13" font-weight="bold" fill="white">数据量是否超过单机内存？</text>
  <text x="430" y="163" text-anchor="middle" font-size="10" fill="white">（通常 32G~128G 为分界）</text>

  <!-- No branch -->
  <line x1="290" y1="147" x2="180" y2="147" stroke="#555" stroke-width="1.5"/>
  <text x="233" y="140" text-anchor="middle" font-size="11" fill="#555">否</text>
  <line x1="180" y1="147" x2="180" y2="200" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Yes branch -->
  <line x1="570" y1="147" x2="680" y2="147" stroke="#555" stroke-width="1.5"/>
  <text x="622" y="140" text-anchor="middle" font-size="11" fill="#555">是</text>
  <line x1="680" y1="147" x2="680" y2="200" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Q2 left: 需要极致一致性? -->
  <rect x="80" y="200" width="200" height="45" rx="8" fill="#e67e22" filter="url(#sh)"/>
  <text x="180" y="222" text-anchor="middle" font-size="12" font-weight="bold" fill="white">需要极致一致性？</text>
  <text x="180" y="238" text-anchor="middle" font-size="10" fill="white">（强一致 / 零丢失）</text>

  <!-- Sentinel path -->
  <line x1="180" y1="245" x2="180" y2="280" stroke="#555" stroke-width="1.5"/>
  <text x="145" y="265" font-size="11" fill="#555">否</text>
  <line x1="180" y1="280" x2="80" y2="280" stroke="#555" stroke-width="1.5"/>
  <line x1="80" y1="280" x2="80" y2="300" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="20" y="300" width="170" height="80" rx="10" fill="#3498db" stroke="#2980b9" stroke-width="2" filter="url(#sh)"/>
  <text x="105" y="325" text-anchor="middle" font-size="13" font-weight="bold" fill="white">主从 + Sentinel</text>
  <text x="105" y="345" text-anchor="middle" font-size="11" fill="#d6eaf8">✅ 运维简单</text>
  <text x="105" y="360" text-anchor="middle" font-size="11" fill="#d6eaf8">✅ 客户端兼容好</text>
  <text x="105" y="375" text-anchor="middle" font-size="11" fill="#d6eaf8">⚠️ 异步复制，可能丢数据</text>

  <!-- Strong consistency path -->
  <line x1="180" y1="245" x2="310" y2="245" stroke="#555" stroke-width="1.5"/>
  <text x="240" y="238" font-size="11" fill="#555">是</text>
  <line x1="310" y1="245" x2="310" y2="300" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="215" y="300" width="190" height="80" rx="10" fill="#8e44ad" stroke="#7d3c98" stroke-width="2" filter="url(#sh)"/>
  <text x="310" y="325" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Sentinel + WAIT 命令</text>
  <text x="310" y="345" text-anchor="middle" font-size="11" fill="#e8daef">✅ 同步等待 N 个 Slave 确认</text>
  <text x="310" y="360" text-anchor="middle" font-size="11" fill="#e8daef">⚠️ 牺牲部分可用性</text>
  <text x="310" y="375" text-anchor="middle" font-size="11" fill="#e8daef">或考虑 ZooKeeper 替代</text>

  <!-- Right branch: Cluster -->
  <rect x="580" y="200" width="200" height="45" rx="8" fill="#e67e22" filter="url(#sh)"/>
  <text x="680" y="222" text-anchor="middle" font-size="12" font-weight="bold" fill="white">需要高写吞吐？</text>
  <text x="680" y="238" text-anchor="middle" font-size="10" fill="white">（写 QPS &gt; 单机上限）</text>

  <line x1="680" y1="245" x2="680" y2="300" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="690" y="270" font-size="11" fill="#555">均适用</text>

  <rect x="565" y="300" width="230" height="80" rx="10" fill="#27ae60" stroke="#1e8449" stroke-width="2" filter="url(#sh)"/>
  <text x="680" y="325" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Redis Cluster</text>
  <text x="680" y="345" text-anchor="middle" font-size="11" fill="#d5f5e3">✅ 水平扩展，内置 HA</text>
  <text x="680" y="360" text-anchor="middle" font-size="11" fill="#d5f5e3">✅ 写吞吐线性增长</text>
  <text x="680" y="375" text-anchor="middle" font-size="11" fill="#d5f5e3">⚠️ 不支持跨 slot 操作</text>

  <!-- Cloud option -->
  <rect x="430" y="300" width="120" height="80" rx="10" fill="#7f8c8d" stroke="#626567" stroke-width="2" filter="url(#sh)"/>
  <text x="490" y="325" text-anchor="middle" font-size="11" font-weight="bold" fill="white">云托管</text>
  <text x="490" y="343" text-anchor="middle" font-size="10" fill="#ddd">ElastiCache</text>
  <text x="490" y="358" text-anchor="middle" font-size="10" fill="#ddd">阿里云 Tair</text>
  <text x="490" y="373" text-anchor="middle" font-size="10" fill="#ddd">底层封装 HA</text>
  <text x="490" y="388" text-anchor="middle" font-size="10" fill="#aaa">✅ 无需自运维</text>

  <line x1="570" y1="147" x2="490" y2="147" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="490" y1="147" x2="490" y2="298" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="510" y="210" font-size="10" fill="#95a5a6">云环境</text>
</svg>
