<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2980b9"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e67e22"/>
    </marker>
    <filter id="sh" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#00000020"/>
    </filter>
  </defs>

  <rect width="900" height="520" fill="#f8f9fa" rx="12"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">Redis Cluster：哈希槽分片与请求路由</text>

  <!-- ===== Slot distribution bar ===== -->
  <text x="450" y="65" text-anchor="middle" font-size="13" fill="#555">16384 个哈希槽均匀分布在 3 个 Master 上</text>
  <!-- Slot bar -->
  <rect x="50" y="75" width="268" height="32" rx="4" fill="#e74c3c"/>
  <text x="184" y="97" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Master A：slot 0 ~ 5460</text>
  <rect x="318" y="75" width="268" height="32" rx="4" fill="#27ae60"/>
  <text x="452" y="97" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Master B：slot 5461 ~ 10922</text>
  <rect x="586" y="75" width="264" height="32" rx="4" fill="#8e44ad"/>
  <text x="718" y="97" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Master C：slot 10923 ~ 16383</text>

  <!-- ===== Cluster nodes ===== -->
  <!-- Master A + Slave A -->
  <rect x="40" y="160" width="150" height="65" rx="10" fill="#e74c3c" stroke="#c0392b" stroke-width="2" filter="url(#sh)"/>
  <text x="115" y="187" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Master A</text>
  <text x="115" y="208" text-anchor="middle" font-size="11" fill="#fad7d7">slot 0 ~ 5460</text>

  <rect x="40" y="245" width="150" height="50" rx="8" fill="#e8a0a0" stroke="#c0392b" stroke-width="1.5" filter="url(#sh)"/>
  <text x="115" y="266" text-anchor="middle" font-size="12" fill="#922b21">Slave A</text>
  <text x="115" y="284" text-anchor="middle" font-size="10" fill="#922b21">异步复制</text>
  <line x1="115" y1="225" x2="115" y2="243" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Master B + Slave B -->
  <rect x="375" y="160" width="150" height="65" rx="10" fill="#27ae60" stroke="#1e8449" stroke-width="2" filter="url(#sh)"/>
  <text x="450" y="187" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Master B</text>
  <text x="450" y="208" text-anchor="middle" font-size="11" fill="#d5f5e3">slot 5461 ~ 10922</text>

  <rect x="375" y="245" width="150" height="50" rx="8" fill="#a9dfbf" stroke="#1e8449" stroke-width="1.5" filter="url(#sh)"/>
  <text x="450" y="266" text-anchor="middle" font-size="12" fill="#1a5246">Slave B</text>
  <text x="450" y="284" text-anchor="middle" font-size="10" fill="#1a5246">异步复制</text>
  <line x1="450" y1="225" x2="450" y2="243" stroke="#1e8449" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Master C + Slave C -->
  <rect x="710" y="160" width="150" height="65" rx="10" fill="#8e44ad" stroke="#7d3c98" stroke-width="2" filter="url(#sh)"/>
  <text x="785" y="187" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Master C</text>
  <text x="785" y="208" text-anchor="middle" font-size="11" fill="#e8daef">slot 10923 ~ 16383</text>

  <rect x="710" y="245" width="150" height="50" rx="8" fill="#d7bde2" stroke="#7d3c98" stroke-width="1.5" filter="url(#sh)"/>
  <text x="785" y="266" text-anchor="middle" font-size="12" fill="#6c3483">Slave C</text>
  <text x="785" y="284" text-anchor="middle" font-size="10" fill="#6c3483">异步复制</text>
  <line x1="785" y1="225" x2="785" y2="243" stroke="#7d3c98" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Gossip lines between masters -->
  <line x1="192" y1="192" x2="373" y2="192" stroke="#bdc3c7" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="527" y1="192" x2="708" y2="192" stroke="#bdc3c7" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="283" y="185" text-anchor="middle" font-size="10" fill="#95a5a6">Gossip</text>
  <text x="618" y="185" text-anchor="middle" font-size="10" fill="#95a5a6">Gossip</text>

  <!-- ===== Request routing ===== -->
  <!-- Client -->
  <rect x="360" y="320" width="180" height="55" rx="8" fill="#2c3e50" filter="url(#sh)"/>
  <text x="450" y="345" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Smart Client</text>
  <text x="450" y="363" text-anchor="middle" font-size="11" fill="#95a5a6">本地缓存 slot→节点路由表</text>

  <!-- Routing annotation -->
  <rect x="30" y="390" width="840" height="120" rx="10" fill="#fef9f0" stroke="#f39c12" stroke-width="1.5"/>
  <text x="450" y="412" text-anchor="middle" font-size="13" font-weight="bold" fill="#e67e22">请求路由三种情形</text>

  <!-- Case 1 -->
  <rect x="45" y="420" width="245" height="80" rx="6" fill="#d5f5e3" stroke="#27ae60" stroke-width="1"/>
  <text x="167" y="438" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e8449">① 命中（直接返回）</text>
  <text x="167" y="455" text-anchor="middle" font-size="10" fill="#1a5276">计算 slot = CRC16(key)%16384</text>
  <text x="167" y="470" text-anchor="middle" font-size="10" fill="#1a5276">查路由缓存 → 发送正确节点</text>
  <text x="167" y="485" text-anchor="middle" font-size="10" fill="#1a5276">节点直接执行 → 返回结果</text>
  <text x="167" y="500" text-anchor="middle" font-size="10" fill="#27ae60">✅ 0 次额外 RTT</text>

  <!-- Case 2 -->
  <rect x="325" y="420" width="245" height="80" rx="6" fill="#fdecea" stroke="#e74c3c" stroke-width="1"/>
  <text x="447" y="438" text-anchor="middle" font-size="11" font-weight="bold" fill="#922b21">② 路由缓存过期（MOVED）</text>
  <text x="447" y="455" text-anchor="middle" font-size="10" fill="#1a5276">发错节点 → 节点返回 -MOVED</text>
  <text x="447" y="470" text-anchor="middle" font-size="10" fill="#1a5276">客户端更新本地路由缓存</text>
  <text x="447" y="485" text-anchor="middle" font-size="10" fill="#1a5276">重定向到正确节点执行</text>
  <text x="447" y="500" text-anchor="middle" font-size="10" fill="#e74c3c">⚠️ 多 1 次 RTT，缓存随即更新</text>

  <!-- Case 3 -->
  <rect x="605" y="420" width="255" height="80" rx="6" fill="#eaf4fb" stroke="#2980b9" stroke-width="1"/>
  <text x="732" y="438" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5276">③ Slot 迁移中（ASK）</text>
  <text x="732" y="455" text-anchor="middle" font-size="10" fill="#1a5276">key 已迁到新节点 → 返回 -ASK</text>
  <text x="732" y="470" text-anchor="middle" font-size="10" fill="#1a5276">客户端先发 ASKING 命令</text>
  <text x="732" y="485" text-anchor="middle" font-size="10" fill="#1a5276">再发原命令 → 不更新缓存</text>
  <text x="732" y="500" text-anchor="middle" font-size="10" fill="#2980b9">⚠️ 多 1 次 RTT，缓存不更新</text>

  <!-- client → masters arrows -->
  <line x1="400" y1="320" x2="190" y2="227" stroke="#2c3e50" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="450" y1="320" x2="450" y2="297" stroke="#2c3e50" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="500" y1="320" x2="710" y2="227" stroke="#2c3e50" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
</svg>
