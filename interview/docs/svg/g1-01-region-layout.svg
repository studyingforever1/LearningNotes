<svg viewBox="0 0 960 760" xmlns="http://www.w3.org/2000/svg" font-family="'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="960" height="760" fill="#f8f9fa" rx="8"/>

  <!-- 标题栏 -->
  <rect x="0" y="0" width="960" height="50" fill="#2c3e50" rx="8"/>
  <rect x="0" y="40" width="960" height="10" fill="#2c3e50"/>
  <text x="480" y="32" text-anchor="middle" fill="white" font-size="20" font-weight="bold">G1 堆结构：Region 化的逻辑分代</text>

  <!-- 旧版分代示意 -->
  <text x="60" y="80" fill="#555" font-size="14" font-weight="bold">传统分代（CMS / Parallel）：物理连续</text>
  <rect x="60" y="90" width="380" height="40" fill="#e8f4ff" stroke="#3498db" stroke-width="1.5" rx="4"/>
  <line x1="220" y1="90" x2="220" y2="130" stroke="#3498db" stroke-dasharray="3,3"/>
  <line x1="270" y1="90" x2="270" y2="130" stroke="#3498db" stroke-dasharray="3,3"/>
  <text x="140" y="115" text-anchor="middle" fill="#2980b9" font-size="13">Eden</text>
  <text x="245" y="115" text-anchor="middle" fill="#2980b9" font-size="12">S0</text>
  <text x="355" y="115" text-anchor="middle" fill="#8e44ad" font-size="13">Old</text>

  <text x="500" y="80" fill="#555" font-size="14" font-weight="bold">G1：逻辑分代，Region 离散</text>
  <text x="500" y="100" fill="#888" font-size="11">每个 Region 1~32MB（2 的幂），堆总 Region 数约 2048 个</text>
  <text x="500" y="118" fill="#888" font-size="11">同一代的 Region 不要求连续，可动态切换角色</text>

  <!-- ===== G1 Region 网格：5 行 x 8 列 = 40 个 Region ===== -->
  <g transform="translate(60, 160)">
    <text x="0" y="-8" fill="#555" font-size="13" font-weight="bold">Java Heap（按 Region 划分，示意 40 个，实际约 2048 个）</text>

    <g font-size="11" text-anchor="middle">
      <!-- row 1 -->
      <rect x="0"   y="0"  width="105" height="48" fill="#d6eaff" stroke="#3498db"/>
      <text x="52"  y="28" fill="#2980b9">Eden</text>
      <rect x="108" y="0"  width="105" height="48" fill="#d6eaff" stroke="#3498db"/>
      <text x="160" y="28" fill="#2980b9">Eden</text>
      <rect x="216" y="0"  width="105" height="48" fill="#fff3cd" stroke="#e67e22"/>
      <text x="268" y="28" fill="#a04000">Survivor</text>
      <rect x="324" y="0"  width="105" height="48" fill="#e8d6f5" stroke="#8e44ad"/>
      <text x="376" y="28" fill="#6c3483">Old</text>
      <rect x="432" y="0"  width="105" height="48" fill="#e8d6f5" stroke="#8e44ad"/>
      <text x="484" y="28" fill="#6c3483">Old</text>
      <rect x="540" y="0"  width="105" height="48" fill="#fadbd8" stroke="#e74c3c"/>
      <text x="592" y="28" fill="#922b21">H (start)</text>
      <rect x="648" y="0"  width="105" height="48" fill="#fadbd8" stroke="#e74c3c" stroke-dasharray="3,3"/>
      <text x="700" y="28" fill="#922b21">H (cont)</text>
      <rect x="756" y="0"  width="105" height="48" fill="#ecf0f1" stroke="#95a5a6"/>
      <text x="808" y="28" fill="#7f8c8d">Free</text>

      <!-- row 2 -->
      <rect x="0"   y="52" width="105" height="48" fill="#d6eaff" stroke="#3498db"/>
      <text x="52"  y="80" fill="#2980b9">Eden</text>
      <rect x="108" y="52" width="105" height="48" fill="#e8d6f5" stroke="#8e44ad"/>
      <text x="160" y="80" fill="#6c3483">Old</text>
      <rect x="216" y="52" width="105" height="48" fill="#e8d6f5" stroke="#8e44ad"/>
      <text x="268" y="80" fill="#6c3483">Old</text>
      <rect x="324" y="52" width="105" height="48" fill="#ecf0f1" stroke="#95a5a6"/>
      <text x="376" y="80" fill="#7f8c8d">Free</text>
      <rect x="432" y="52" width="105" height="48" fill="#d6eaff" stroke="#3498db"/>
      <text x="484" y="80" fill="#2980b9">Eden</text>
      <rect x="540" y="52" width="105" height="48" fill="#fff3cd" stroke="#e67e22"/>
      <text x="592" y="80" fill="#a04000">Survivor</text>
      <rect x="648" y="52" width="105" height="48" fill="#e8d6f5" stroke="#8e44ad"/>
      <text x="700" y="80" fill="#6c3483">Old</text>
      <rect x="756" y="52" width="105" height="48" fill="#ecf0f1" stroke="#95a5a6"/>
      <text x="808" y="80" fill="#7f8c8d">Free</text>

      <!-- row 3 -->
      <rect x="0"   y="104" width="105" height="48" fill="#e8d6f5" stroke="#8e44ad"/>
      <text x="52"  y="132" fill="#6c3483">Old</text>
      <rect x="108" y="104" width="105" height="48" fill="#ecf0f1" stroke="#95a5a6"/>
      <text x="160" y="132" fill="#7f8c8d">Free</text>
      <rect x="216" y="104" width="105" height="48" fill="#d6eaff" stroke="#3498db"/>
      <text x="268" y="132" fill="#2980b9">Eden</text>
      <rect x="324" y="104" width="105" height="48" fill="#fadbd8" stroke="#e74c3c"/>
      <text x="376" y="132" fill="#922b21">H (single)</text>
      <rect x="432" y="104" width="105" height="48" fill="#e8d6f5" stroke="#8e44ad"/>
      <text x="484" y="132" fill="#6c3483">Old</text>
      <rect x="540" y="104" width="105" height="48" fill="#ecf0f1" stroke="#95a5a6"/>
      <text x="592" y="132" fill="#7f8c8d">Free</text>
      <rect x="648" y="104" width="105" height="48" fill="#d6eaff" stroke="#3498db"/>
      <text x="700" y="132" fill="#2980b9">Eden</text>
      <rect x="756" y="104" width="105" height="48" fill="#e8d6f5" stroke="#8e44ad"/>
      <text x="808" y="132" fill="#6c3483">Old</text>

      <!-- row 4 -->
      <rect x="0"   y="156" width="105" height="48" fill="#fff3cd" stroke="#e67e22"/>
      <text x="52"  y="184" fill="#a04000">Survivor</text>
      <rect x="108" y="156" width="105" height="48" fill="#e8d6f5" stroke="#8e44ad"/>
      <text x="160" y="184" fill="#6c3483">Old</text>
      <rect x="216" y="156" width="105" height="48" fill="#fadbd8" stroke="#e74c3c"/>
      <text x="268" y="184" fill="#922b21">H (start)</text>
      <rect x="324" y="156" width="105" height="48" fill="#fadbd8" stroke="#e74c3c" stroke-dasharray="3,3"/>
      <text x="376" y="184" fill="#922b21">H (cont)</text>
      <rect x="432" y="156" width="105" height="48" fill="#fadbd8" stroke="#e74c3c" stroke-dasharray="3,3"/>
      <text x="484" y="184" fill="#922b21">H (cont)</text>
      <rect x="540" y="156" width="105" height="48" fill="#d6eaff" stroke="#3498db"/>
      <text x="592" y="184" fill="#2980b9">Eden</text>
      <rect x="648" y="156" width="105" height="48" fill="#ecf0f1" stroke="#95a5a6"/>
      <text x="700" y="184" fill="#7f8c8d">Free</text>
      <rect x="756" y="156" width="105" height="48" fill="#e8d6f5" stroke="#8e44ad"/>
      <text x="808" y="184" fill="#6c3483">Old</text>

      <!-- row 5 -->
      <rect x="0"   y="208" width="105" height="48" fill="#ecf0f1" stroke="#95a5a6"/>
      <text x="52"  y="236" fill="#7f8c8d">Free</text>
      <rect x="108" y="208" width="105" height="48" fill="#d6eaff" stroke="#3498db"/>
      <text x="160" y="236" fill="#2980b9">Eden</text>
      <rect x="216" y="208" width="105" height="48" fill="#e8d6f5" stroke="#8e44ad"/>
      <text x="268" y="236" fill="#6c3483">Old</text>
      <rect x="324" y="208" width="105" height="48" fill="#ecf0f1" stroke="#95a5a6"/>
      <text x="376" y="236" fill="#7f8c8d">Free</text>
      <rect x="432" y="208" width="105" height="48" fill="#e8d6f5" stroke="#8e44ad"/>
      <text x="484" y="236" fill="#6c3483">Old</text>
      <rect x="540" y="208" width="105" height="48" fill="#fff3cd" stroke="#e67e22"/>
      <text x="592" y="236" fill="#a04000">Survivor</text>
      <rect x="648" y="208" width="105" height="48" fill="#e8d6f5" stroke="#8e44ad"/>
      <text x="700" y="236" fill="#6c3483">Old</text>
      <rect x="756" y="208" width="105" height="48" fill="#ecf0f1" stroke="#95a5a6"/>
      <text x="808" y="236" fill="#7f8c8d">Free</text>
    </g>

    <text x="430" y="280" text-anchor="middle" font-size="11" fill="#888">注：H (start) 与后续 H (cont) 必须物理连续，组成一个大对象（Humongous）</text>
  </g>

  <!-- 图例 -->
  <g transform="translate(60, 480)">
    <text x="0" y="0" font-size="14" font-weight="bold" fill="#555">Region 类型说明</text>

    <rect x="0"  y="14" width="22" height="22" fill="#d6eaff" stroke="#3498db"/>
    <text x="30" y="30" font-size="12" fill="#333">Eden — 新对象初始分配</text>

    <rect x="0"  y="44" width="22" height="22" fill="#fff3cd" stroke="#e67e22"/>
    <text x="30" y="60" font-size="12" fill="#333">Survivor — 年轻代幸存区，存放 Young GC 后存活的对象</text>

    <rect x="0"  y="74" width="22" height="22" fill="#e8d6f5" stroke="#8e44ad"/>
    <text x="30" y="90" font-size="12" fill="#333">Old — 老年代，对象经多次 Young GC 后晋升到此</text>

    <rect x="0"  y="104" width="22" height="22" fill="#fadbd8" stroke="#e74c3c"/>
    <text x="30" y="120" font-size="12" fill="#333">Humongous — 大对象（≥ Region 一半），可跨多个连续 Region</text>

    <rect x="0"  y="134" width="22" height="22" fill="#ecf0f1" stroke="#95a5a6"/>
    <text x="30" y="150" font-size="12" fill="#333">Free — 空闲，等待被分配为任意角色</text>
  </g>

  <!-- 关键参数 -->
  <g transform="translate(540, 480)">
    <rect x="0" y="0" width="380" height="220" fill="#fef9e7" stroke="#f1c40f" stroke-width="1.5" rx="6"/>
    <text x="190" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#7d6608">关键参数</text>

    <text x="14" y="48" font-size="12" fill="#333">• -XX:G1HeapRegionSize=N  Region 大小（1~32MB）</text>
    <text x="14" y="72" font-size="12" fill="#333">• -XX:MaxGCPauseMillis=200 目标停顿时间</text>
    <text x="14" y="96" font-size="12" fill="#333">• -XX:G1NewSizePercent=5  年轻代下限</text>
    <text x="14" y="120" font-size="12" fill="#333">• -XX:G1MaxNewSizePercent=60  年轻代上限</text>
    <text x="14" y="144" font-size="12" fill="#333">• -XX:InitiatingHeapOccupancyPercent=45  并发标记触发</text>
    <text x="14" y="168" font-size="12" fill="#333">• -XX:G1MixedGCLiveThresholdPercent=85  存活率上限</text>
    <text x="14" y="192" font-size="12" fill="#333">• -XX:G1ReservePercent=10  防晋升失败的预留</text>
  </g>
</svg>
