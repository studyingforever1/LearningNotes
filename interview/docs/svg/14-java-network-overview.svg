<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 820" font-family="'Courier New', monospace">
  <rect width="1000" height="820" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="500" y="32" text-anchor="middle" font-size="19" font-weight="bold" fill="#2c3e50">Java 网络读写全景：从代码到网卡</text>
  <text x="500" y="52" text-anchor="middle" font-size="12" fill="#7f8c8d">以一次 Java SocketChannel.write() + SocketChannel.read() 为例</text>

  <!-- ===== LEFT: 发送路径 ===== -->
  <!-- Layer labels (left side) -->
  <text x="8" y="105" font-size="10" fill="#7f8c8d" transform="rotate(-90,8,105)" text-anchor="middle">用户态</text>
  <text x="8" y="310" font-size="10" fill="#7f8c8d" transform="rotate(-90,8,310)" text-anchor="middle">内核态</text>
  <text x="8" y="560" font-size="10" fill="#7f8c8d" transform="rotate(-90,8,560)" text-anchor="middle">硬件</text>

  <!-- Horizontal dividers -->
  <line x1="20" y1="155" x2="980" y2="155" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="6,3"/>
  <line x1="20" y1="490" x2="980" y2="490" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="25" y="150" font-size="10" fill="#95a5a6">─── 用户态 / 内核态边界（syscall） ───────────────────────────────────────────────────────────────</text>
  <text x="25" y="485" font-size="10" fill="#95a5a6">─── 内核 / 硬件边界（DMA） ────────────────────────────────────────────────────────────────────────</text>

  <!-- ===== SEND PATH (left column) ===== -->
  <text x="260" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="#2980b9">📤 发送路径</text>

  <!-- [1] Java 用户代码 -->
  <rect x="40" y="80" width="440" height="68" rx="8" fill="#d6eaf8" stroke="#2980b9" stroke-width="2"/>
  <text x="260" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a5276">① Java 用户代码</text>
  <text x="55" y="118" font-size="11" fill="#1a252f">SocketChannel ch = SocketChannel.open();</text>
  <text x="55" y="134" font-size="11" fill="#1a252f">ByteBuffer buf = ByteBuffer.wrap("GET / HTTP/1.1\r\n".getBytes());</text>
  <text x="55" y="148" font-size="11" fill="#1a252f">ch.write(buf);  // → JNI → write() / sendmsg() syscall</text>

  <!-- arrow -->
  <line x1="260" y1="155" x2="260" y2="175" stroke="#2980b9" stroke-width="2" marker-end="url(#arr-b)"/>
  <text x="270" y="168" font-size="10" fill="#2980b9">syscall</text>

  <!-- [2] VFS / Socket 层 -->
  <rect x="40" y="176" width="440" height="52" rx="6" fill="#eaf4fb" stroke="#2980b9" stroke-width="1.5"/>
  <text x="260" y="196" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a5276">② VFS / Socket 层</text>
  <text x="55" y="214" font-size="11" fill="#1a252f">sys_sendmsg() → sock_sendmsg() → inet_sendmsg()</text>
  <text x="55" y="228" font-size="11" fill="#7f8c8d">  copy_from_user()：将 ByteBuffer 数据复制进内核 sk_buff</text>

  <line x1="260" y1="228" x2="260" y2="248" stroke="#2980b9" stroke-width="2" marker-end="url(#arr-b)"/>

  <!-- [3] TCP 层 -->
  <rect x="40" y="249" width="440" height="70" rx="6" fill="#eaf4fb" stroke="#2980b9" stroke-width="1.5"/>
  <text x="260" y="268" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a5276">③ TCP 层（tcp_sendmsg）</text>
  <text x="55" y="286" font-size="11" fill="#1a252f">分配 sk_buff，填充 TCP 头（seq/ack/flags/window）</text>
  <text x="55" y="300" font-size="11" fill="#1a252f">加入 sk_write_queue（发送队列），等待 TCP 窗口/Nagle</text>
  <text x="55" y="314" font-size="11" fill="#7f8c8d">  tcp_transmit_skb() → 交给 IP 层</text>

  <line x1="260" y1="319" x2="260" y2="339" stroke="#2980b9" stroke-width="2" marker-end="url(#arr-b)"/>

  <!-- [4] IP 层 -->
  <rect x="40" y="340" width="440" height="52" rx="6" fill="#eaf4fb" stroke="#2980b9" stroke-width="1.5"/>
  <text x="260" y="358" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a5276">④ IP 层（ip_queue_xmit）</text>
  <text x="55" y="376" font-size="11" fill="#1a252f">填充 IP 头（src/dst IP，TTL），查路由表选出口</text>
  <text x="55" y="390" font-size="11" fill="#7f8c8d">  分片（MTU=1500B）→ 交给邻居子系统（ARP）</text>

  <line x1="260" y1="392" x2="260" y2="412" stroke="#2980b9" stroke-width="2" marker-end="url(#arr-b)"/>

  <!-- [5] 网络设备层 -->
  <rect x="40" y="413" width="440" height="52" rx="6" fill="#eaf4fb" stroke="#2980b9" stroke-width="1.5"/>
  <text x="260" y="431" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a5276">⑤ 网络设备层（dev_queue_xmit）</text>
  <text x="55" y="449" font-size="11" fill="#1a252f">填充以太网帧头（MAC），加入 qdisc（流量控制队列）</text>
  <text x="55" y="463" font-size="11" fill="#7f8c8d">  ndo_start_xmit() → 驱动发送函数</text>

  <line x1="260" y1="490" x2="260" y2="510" stroke="#2980b9" stroke-width="2" marker-end="url(#arr-b)"/>
  <text x="270" y="503" font-size="10" fill="#2980b9">DMA</text>

  <!-- [6] NIC TX -->
  <rect x="40" y="511" width="440" height="52" rx="6" fill="#fdedec" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="260" y="529" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">⑥ NIC TX Ring Buffer + DMA</text>
  <text x="55" y="547" font-size="11" fill="#1a252f">驱动将 sk_buff 物理地址写入 TX Ring Buffer 描述符</text>
  <text x="55" y="561" font-size="11" fill="#1a252f">NIC DMA 引擎从内存读数据，串行化为电信号发出</text>

  <line x1="260" y1="563" x2="260" y2="583" stroke="#e74c3c" stroke-width="2" marker-end="url(#arr-r)"/>

  <!-- [7] 物理网络 -->
  <rect x="40" y="584" width="440" height="36" rx="6" fill="#c0392b"/>
  <text x="260" y="607" text-anchor="middle" font-size="12" fill="white" font-weight="bold">⑦ 物理网络 → 对端 NIC</text>

  <!-- ===== RECEIVE PATH (right column) ===== -->
  <text x="740" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="#27ae60">📥 接收路径</text>

  <!-- [7] 物理网络 -->
  <rect x="520" y="584" width="440" height="36" rx="6" fill="#1a9750"/>
  <text x="740" y="607" text-anchor="middle" font-size="12" fill="white" font-weight="bold">① 物理网络数据到达 NIC</text>

  <line x1="740" y1="584" x2="740" y2="564" stroke="#27ae60" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="750" y="577" font-size="10" fill="#27ae60">DMA</text>

  <!-- [6] NIC RX -->
  <rect x="520" y="511" width="440" height="52" rx="6" fill="#d5f5e3" stroke="#27ae60" stroke-width="1.5"/>
  <text x="740" y="529" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d8348">② NIC RX Ring Buffer + DMA</text>
  <text x="535" y="547" font-size="11" fill="#1a252f">NIC DMA 将帧数据写入预分配的 sk_buff 内存</text>
  <text x="535" y="561" font-size="11" fill="#1a252f">硬中断通知 CPU → NAPI 禁用中断，软中断轮询</text>

  <line x1="740" y1="511" x2="740" y2="491" stroke="#27ae60" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- [5] 驱动/NAPI -->
  <rect x="520" y="413" width="440" height="52" rx="6" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="740" y="431" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d8348">③ 驱动 NAPI poll() → netif_receive_skb()</text>
  <text x="535" y="449" font-size="11" fill="#1a252f">从 RX Ring Buffer 取出 sk_buff</text>
  <text x="535" y="463" font-size="11" fill="#7f8c8d">  GRO（Generic Receive Offload）合并小包 → 提交协议栈</text>

  <line x1="740" y1="413" x2="740" y2="393" stroke="#27ae60" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- [4] IP 层 -->
  <rect x="520" y="340" width="440" height="52" rx="6" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="740" y="358" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d8348">④ IP 层（ip_rcv）</text>
  <text x="535" y="376" font-size="11" fill="#1a252f">校验 IP 头，去掉 IP 头，查路由（本机/转发）</text>
  <text x="535" y="390" font-size="11" fill="#7f8c8d">  → tcp_v4_rcv() 交给 TCP 层</text>

  <line x1="740" y1="340" x2="740" y2="320" stroke="#27ae60" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- [3] TCP 层 -->
  <rect x="520" y="249" width="440" height="70" rx="6" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="740" y="268" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d8348">⑤ TCP 层（tcp_v4_rcv）</text>
  <text x="535" y="286" font-size="11" fill="#1a252f">校验 seq，乱序重排（out-of-order queue）</text>
  <text x="535" y="300" font-size="11" fill="#1a252f">放入 sk_receive_queue（接收缓冲区），更新 ACK</text>
  <text x="535" y="314" font-size="11" fill="#7f8c8d">  唤醒阻塞在 read() 的进程（或触发 epoll 事件）</text>

  <line x1="740" y1="249" x2="740" y2="229" stroke="#27ae60" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- [2] VFS / Socket 层 -->
  <rect x="520" y="176" width="440" height="52" rx="6" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="740" y="196" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d8348">⑥ VFS / Socket 层</text>
  <text x="535" y="214" font-size="11" fill="#1a252f">sys_recvmsg() → sock_recvmsg() → tcp_recvmsg()</text>
  <text x="535" y="228" font-size="11" fill="#7f8c8d">  copy_to_user()：将 sk_receive_queue 数据复制到用户 ByteBuffer</text>

  <line x1="740" y1="176" x2="740" y2="156" stroke="#27ae60" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="750" y="168" font-size="10" fill="#27ae60">syscall return</text>

  <!-- [1] Java 用户代码 -->
  <rect x="520" y="80" width="440" height="68" rx="8" fill="#d5f5e3" stroke="#27ae60" stroke-width="2"/>
  <text x="740" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d8348">⑦ Java 用户代码</text>
  <text x="535" y="118" font-size="11" fill="#1a252f">ByteBuffer readBuf = ByteBuffer.allocate(4096);</text>
  <text x="535" y="134" font-size="11" fill="#1a252f">int n = ch.read(readBuf);  // JNI → read() / recvmsg() syscall</text>
  <text x="535" y="148" font-size="11" fill="#1a252f">// 数据已在 readBuf 中，可直接使用</text>

  <!-- ===== Bottom: memory copy count ===== -->
  <rect x="40" y="636" width="920" height="92" rx="8" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
  <text x="500" y="656" text-anchor="middle" font-size="13" font-weight="bold" fill="#b7770d">内存复制次数统计（普通 blocking I/O）</text>

  <!-- send -->
  <rect x="55" y="664" width="410" height="56" rx="5" fill="#fff" stroke="#2980b9" stroke-width="1"/>
  <text x="60" y="679" font-size="11" font-weight="bold" fill="#2980b9">发送（write）：2次复制</text>
  <text x="60" y="694" font-size="10" fill="#1a252f">① Java ByteBuffer → 内核 sk_buff（copy_from_user，CPU复制）</text>
  <text x="60" y="708" font-size="10" fill="#1a252f">② 内核 sk_buff → NIC TX FIFO（DMA，无CPU参与）</text>

  <!-- recv -->
  <rect x="475" y="664" width="478" height="56" rx="5" fill="#fff" stroke="#27ae60" stroke-width="1"/>
  <text x="480" y="679" font-size="11" font-weight="bold" fill="#27ae60">接收（read）：2次复制</text>
  <text x="480" y="694" font-size="10" fill="#1a252f">① NIC RX → 内核 sk_buff（DMA，无CPU参与）</text>
  <text x="480" y="708" font-size="10" fill="#1a252f">② 内核 sk_buff → Java ByteBuffer（copy_to_user，CPU复制）</text>

  <!-- ===== Bottom note ===== -->
  <text x="500" y="750" text-anchor="middle" font-size="11" fill="#7f8c8d">※ 零拷贝（sendfile/DirectByteBuffer/io_uring）可消除用户态CPU复制，但DMA复制是硬件必须的，无法消除</text>
  <text x="500" y="766" text-anchor="middle" font-size="11" fill="#7f8c8d">※ Java NIO DirectByteBuffer 分配在堆外（mmap 匿名区），避免了 JVM 堆 → 内核的额外一次复制</text>

  <!-- defs -->
  <defs>
    <marker id="arr-b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#2980b9"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#27ae60"/>
    </marker>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#e74c3c"/>
    </marker>
  </defs>

  <!-- center connector -->
  <line x1="480" y1="602" x2="520" y2="602" stroke="#7f8c8d" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="500" y="598" text-anchor="middle" font-size="9" fill="#7f8c8d">物理网络</text>
</svg>
