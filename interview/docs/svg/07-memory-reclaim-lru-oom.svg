<svg xmlns="http://www.w3.org/2000/svg" width="900" height="580" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arr-r" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
    <marker id="arr-g" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
    <marker id="arr-b" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2980b9"/>
    </marker>
  </defs>

  <rect width="900" height="580" fill="#f8f9fa" rx="12"/>
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">内存回收机制：kswapd、LRU 与 OOM Killer</text>

  <!-- 内存水位线（左侧） -->
  <rect x="30" y="60" width="220" height="480" rx="10" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="140" y="84" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">物理内存水位线</text>

  <!-- 内存满格 -->
  <rect x="60" y="98" width="160" height="60" rx="5" fill="#27ae60" stroke="#1a7a42" stroke-width="1"/>
  <text x="140" y="122" text-anchor="middle" font-size="11" font-weight="bold" fill="white">正常区域</text>
  <text x="140" y="140" text-anchor="middle" font-size="10" fill="#c8f5d8">空闲内存充足</text>

  <!-- high水位 -->
  <line x1="40" y1="158" x2="240" y2="158" stroke="#27ae60" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="248" y="163" font-size="10" fill="#27ae60" font-weight="bold">pages_high</text>
  <text x="248" y="175" font-size="9" fill="#888">kswapd 停止</text>

  <rect x="60" y="160" width="160" height="60" rx="5" fill="#f39c12" stroke="#d68910" stroke-width="1"/>
  <text x="140" y="184" text-anchor="middle" font-size="11" font-weight="bold" fill="white">kswapd 回收区</text>
  <text x="140" y="202" text-anchor="middle" font-size="10" fill="#fff3cc">后台异步回收</text>

  <!-- low水位 -->
  <line x1="40" y1="220" x2="240" y2="220" stroke="#f39c12" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="248" y="225" font-size="10" fill="#f39c12" font-weight="bold">pages_low</text>
  <text x="248" y="237" font-size="9" fill="#888">kswapd 唤醒</text>

  <rect x="60" y="222" width="160" height="60" rx="5" fill="#e67e22" stroke="#ca6f1e" stroke-width="1"/>
  <text x="140" y="246" text-anchor="middle" font-size="11" font-weight="bold" fill="white">直接回收区</text>
  <text x="140" y="264" text-anchor="middle" font-size="10" fill="#ffe8cc">阻塞申请方</text>

  <!-- min水位 -->
  <line x1="40" y1="282" x2="240" y2="282" stroke="#e74c3c" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="248" y="287" font-size="10" fill="#e74c3c" font-weight="bold">pages_min</text>
  <text x="248" y="299" font-size="9" fill="#888">限制非内核分配</text>

  <rect x="60" y="284" width="160" height="60" rx="5" fill="#c0392b" stroke="#8b1a1a" stroke-width="1"/>
  <text x="140" y="308" text-anchor="middle" font-size="11" font-weight="bold" fill="white">OOM 触发区</text>
  <text x="140" y="326" text-anchor="middle" font-size="10" fill="#ffc8c8">极端内存不足</text>

  <!-- 0线 -->
  <line x1="40" y1="344" x2="240" y2="344" stroke="#8b1a1a" stroke-width="2"/>
  <text x="140" y="360" text-anchor="middle" font-size="10" fill="#e74c3c">0 — OOM Killer 出击</text>

  <!-- 调节参数 -->
  <rect x="40" y="378" width="180" height="115" rx="6" fill="#2c3e50" stroke="#1a252f" stroke-width="1"/>
  <text x="130" y="398" text-anchor="middle" font-size="11" font-weight="bold" fill="#ecf0f1">关键参数</text>
  <text x="50" y="416" font-size="9" fill="#95a5a6">vm.min_free_kbytes</text>
  <text x="50" y="432" font-size="9" fill="#95a5a6">vm.swappiness (0~200)</text>
  <text x="50" y="448" font-size="9" fill="#95a5a6">vm.dirty_ratio (20%)</text>
  <text x="50" y="464" font-size="9" fill="#95a5a6">vm.dirty_background_ratio</text>
  <text x="50" y="480" font-size="9" fill="#95a5a6">vm.overcommit_memory</text>

  <!-- LRU 链表（中间） -->
  <rect x="310" y="60" width="300" height="430" rx="10" fill="#fef5e7" stroke="#e67e22" stroke-width="1.5"/>
  <text x="460" y="84" text-anchor="middle" font-size="13" font-weight="bold" fill="#8b4513">LRU 链表（页面老化）</text>

  <!-- Active Anon -->
  <rect x="330" y="96" width="260" height="55" rx="6" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5"/>
  <text x="460" y="118" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Active Anon</text>
  <text x="460" y="136" text-anchor="middle" font-size="10" fill="#ffc8c8">近期访问的匿名页（堆/栈）</text>

  <!-- 老化箭头 -->
  <text x="460" y="165" text-anchor="middle" font-size="10" fill="#888">访问减少 → 老化</text>
  <line x1="460" y1="151" x2="460" y2="170" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- Inactive Anon -->
  <rect x="330" y="174" width="260" height="55" rx="6" fill="#e67e22" stroke="#ca6f1e" stroke-width="1.5"/>
  <text x="460" y="196" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Inactive Anon</text>
  <text x="460" y="214" text-anchor="middle" font-size="10" fill="#ffe8cc">候选换出到 Swap</text>

  <!-- 分隔线 -->
  <line x1="330" y1="242" x2="590" y2="242" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="460" y="258" text-anchor="middle" font-size="10" fill="#aaa">— 匿名页 / 文件缓存页 分界 —</text>

  <!-- Active File -->
  <rect x="330" y="264" width="260" height="55" rx="6" fill="#2980b9" stroke="#1a5276" stroke-width="1.5"/>
  <text x="460" y="286" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Active File</text>
  <text x="460" y="304" text-anchor="middle" font-size="10" fill="#d0e8ff">近期访问的文件缓存页</text>

  <text x="460" y="333" text-anchor="middle" font-size="10" fill="#888">访问减少 → 老化</text>
  <line x1="460" y1="319" x2="460" y2="338" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- Inactive File -->
  <rect x="330" y="342" width="260" height="55" rx="6" fill="#27ae60" stroke="#1a7a42" stroke-width="1.5"/>
  <text x="460" y="364" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Inactive File</text>
  <text x="460" y="382" text-anchor="middle" font-size="10" fill="#c8f5d8">候选释放（有后端文件）</text>

  <!-- Unevictable -->
  <rect x="330" y="412" width="260" height="50" rx="6" fill="#7f8c8d" stroke="#6c7a7d" stroke-width="1.5"/>
  <text x="460" y="432" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Unevictable</text>
  <text x="460" y="450" text-anchor="middle" font-size="10" fill="#ecf0f1">mlock() 锁定，不可回收</text>

  <!-- 回收方向标注 -->
  <text x="600" y="200" font-size="11" fill="#e74c3c">→ Swap 换出</text>
  <text x="600" y="370" font-size="11" fill="#27ae60">→ 直接释放</text>

  <!-- kswapd / OOM Killer（右侧） -->
  <rect x="630" y="60" width="250" height="200" rx="10" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="755" y="84" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a7a42">kswapd 工作流程</text>

  <rect x="648" y="96" width="214" height="36" rx="5" fill="#27ae60" stroke="#1a7a42" stroke-width="1"/>
  <text x="755" y="118" text-anchor="middle" font-size="11" fill="white">内存低于 pages_low</text>

  <line x1="755" y1="132" x2="755" y2="146" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <rect x="648" y="148" width="214" height="36" rx="5" fill="#16a085" stroke="#0e6655" stroke-width="1"/>
  <text x="755" y="168" text-anchor="middle" font-size="11" fill="white">扫描 Inactive 链表</text>

  <line x1="755" y1="184" x2="755" y2="198" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <rect x="648" y="200" width="214" height="44" rx="5" fill="#1a7a42" stroke="#0d4026" stroke-width="1"/>
  <text x="755" y="220" text-anchor="middle" font-size="11" fill="white">文件页：回写或直接释放</text>
  <text x="755" y="238" text-anchor="middle" font-size="10" fill="#c8f5d8">匿名页：写入 Swap 分区</text>

  <line x1="755" y1="244" x2="755" y2="258" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <!-- 内存恢复到high -->

  <!-- Swap 流程 -->
  <rect x="630" y="275" width="250" height="185" rx="10" fill="#fdecea" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="755" y="298" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">OOM Killer</text>

  <text x="640" y="318" font-size="11" fill="#555">① 所有回收手段耗尽</text>
  <text x="640" y="336" font-size="11" fill="#555">② 遍历所有进程</text>
  <text x="640" y="354" font-size="11" fill="#555">③ 计算 oom_score</text>

  <rect x="645" y="362" width="220" height="44" rx="5" fill="#e74c3c" stroke="#c0392b" stroke-width="1"/>
  <text x="755" y="381" text-anchor="middle" font-size="11" fill="white">oom_score = 内存占用比</text>
  <text x="755" y="397" text-anchor="middle" font-size="10" fill="#ffc8c8">+ oom_score_adj 调整值</text>

  <text x="640" y="422" font-size="11" fill="#c0392b">④ 发送 SIGKILL 杀死得分最高进程</text>
  <text x="640" y="440" font-size="10" fill="#888">/proc/&lt;pid&gt;/oom_adj  调整优先级</text>

  <!-- Swap区域 -->
  <rect x="630" y="474" width="250" height="100" rx="10" fill="#2c3e50" stroke="#1a252f" stroke-width="1.5"/>
  <text x="755" y="497" text-anchor="middle" font-size="13" font-weight="bold" fill="#ecf0f1">Swap 机制</text>
  <text x="640" y="516" font-size="10" fill="#95a5a6">匿名页 → 写入 Swap 分区/文件</text>
  <text x="640" y="532" font-size="10" fill="#95a5a6">PTE 标记 swap entry（不清零）</text>
  <text x="640" y="548" font-size="10" fill="#95a5a6">再次访问 → 缺页 → 换入物理页</text>
  <text x="640" y="564" font-size="10" fill="#7f8c8d">vm.swappiness=0 尽量不换出</text>
</svg>
