<svg xmlns="http://www.w3.org/2000/svg" width="900" height="620" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2980b9"/>
    </marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e67e22"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
  </defs>

  <rect width="900" height="620" fill="#f8f9fa" rx="12"/>
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">内存与磁盘交互：Page Cache 与刷盘机制</text>

  <!-- 用户空间 -->
  <rect x="30" y="58" width="840" height="80" rx="8" fill="#e8f4f8" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="50" y="78" font-size="13" font-weight="bold" fill="#2c5f8a">用户空间</text>
  <rect x="60" y="86" width="160" height="40" rx="6" fill="#4a90d9" stroke="#2c5f8a" stroke-width="1.5"/>
  <text x="140" y="110" text-anchor="middle" font-size="12" font-weight="bold" fill="white">应用程序</text>

  <rect x="260" y="86" width="120" height="40" rx="6" fill="#7ab3d9" stroke="#2c5f8a" stroke-width="1"/>
  <text x="320" y="104" text-anchor="middle" font-size="11" fill="white">read(fd, buf)</text>
  <text x="320" y="119" text-anchor="middle" font-size="10" fill="#d0e8ff">系统调用</text>

  <rect x="420" y="86" width="120" height="40" rx="6" fill="#7ab3d9" stroke="#2c5f8a" stroke-width="1"/>
  <text x="480" y="104" text-anchor="middle" font-size="11" fill="white">write(fd, buf)</text>
  <text x="480" y="119" text-anchor="middle" font-size="10" fill="#d0e8ff">系统调用</text>

  <rect x="580" y="86" width="120" height="40" rx="6" fill="#7ab3d9" stroke="#2c5f8a" stroke-width="1"/>
  <text x="640" y="104" text-anchor="middle" font-size="11" fill="white">mmap(file)</text>
  <text x="640" y="119" text-anchor="middle" font-size="10" fill="#d0e8ff">内存映射</text>

  <rect x="740" y="86" width="110" height="40" rx="6" fill="#7ab3d9" stroke="#2c5f8a" stroke-width="1"/>
  <text x="795" y="104" text-anchor="middle" font-size="11" fill="white">fsync()</text>
  <text x="795" y="119" text-anchor="middle" font-size="10" fill="#d0e8ff">强制刷盘</text>

  <!-- Page Cache 大区域 -->
  <rect x="30" y="168" width="840" height="175" rx="8" fill="#fef5e7" stroke="#e67e22" stroke-width="2"/>
  <text x="50" y="190" font-size="14" font-weight="bold" fill="#8b4513">Page Cache（内核页面缓存）</text>
  <text x="50" y="208" font-size="11" fill="#888">inode → address_space → xarray 索引树（文件偏移 → 物理页）</text>

  <!-- 页面状态 -->
  <rect x="55" y="218" width="115" height="110" rx="6" fill="#27ae60" stroke="#1a7a42" stroke-width="1.5"/>
  <text x="112" y="238" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Clean 页</text>
  <text x="112" y="256" text-anchor="middle" font-size="10" fill="#c8f5d8">PG_uptodate=1</text>
  <text x="112" y="272" text-anchor="middle" font-size="10" fill="#c8f5d8">PG_dirty=0</text>
  <text x="112" y="290" text-anchor="middle" font-size="10" fill="#a8e8be">与磁盘一致</text>
  <text x="112" y="308" text-anchor="middle" font-size="10" fill="#a8e8be">可随时释放</text>

  <rect x="190" y="218" width="115" height="110" rx="6" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5"/>
  <text x="247" y="238" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Dirty 页</text>
  <text x="247" y="256" text-anchor="middle" font-size="10" fill="#ffc8c8">PG_dirty=1</text>
  <text x="247" y="272" text-anchor="middle" font-size="10" fill="#ffc8c8">已修改未回写</text>
  <text x="247" y="290" text-anchor="middle" font-size="10" fill="#ffaaaa">需要刷盘</text>
  <text x="247" y="308" text-anchor="middle" font-size="10" fill="#ffaaaa">不可直接释放</text>

  <rect x="325" y="218" width="115" height="110" rx="6" fill="#f39c12" stroke="#d68910" stroke-width="1.5"/>
  <text x="382" y="238" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Writeback 页</text>
  <text x="382" y="256" text-anchor="middle" font-size="10" fill="#fff3cc">PG_writeback=1</text>
  <text x="382" y="272" text-anchor="middle" font-size="10" fill="#fff3cc">正在回写中</text>
  <text x="382" y="290" text-anchor="middle" font-size="10" fill="#ffe9aa">异步 I/O 进行</text>
  <text x="382" y="308" text-anchor="middle" font-size="10" fill="#ffe9aa">完成后变 Clean</text>

  <!-- 脏页回写触发条件 -->
  <rect x="460" y="218" width="390" height="110" rx="6" fill="#2c3e50" stroke="#1a252f" stroke-width="1.5"/>
  <text x="655" y="240" text-anchor="middle" font-size="12" font-weight="bold" fill="#ecf0f1">脏页回写触发条件</text>
  <text x="475" y="260" font-size="11" fill="#e74c3c">① 脏页比例 &gt; vm.dirty_ratio (20%)</text>
  <text x="475" y="278" font-size="11" fill="#f39c12">② 后台: 脏页 &gt; dirty_background_ratio (10%)</text>
  <text x="475" y="296" font-size="11" fill="#27ae60">③ 脏页存活 &gt; dirty_expire_centisecs (30s)</text>
  <text x="475" y="314" font-size="11" fill="#2980b9">④ 应用调用 fsync() / sync / msync()</text>

  <!-- 中间层：回写线程 和 I/O调度 -->
  <rect x="30" y="372" width="840" height="70" rx="8" fill="#f8f9fa" stroke="#bdc3c7" stroke-width="1.5"/>
  <rect x="50" y="382" width="200" height="48" rx="6" fill="#8e44ad" stroke="#5d2d7a" stroke-width="1.5"/>
  <text x="150" y="402" text-anchor="middle" font-size="12" font-weight="bold" fill="white">flusher 内核线程</text>
  <text x="150" y="420" text-anchor="middle" font-size="10" fill="#e8c8ff">bdi-default / kworker</text>

  <rect x="275" y="382" width="200" height="48" rx="6" fill="#2980b9" stroke="#1a5276" stroke-width="1.5"/>
  <text x="375" y="402" text-anchor="middle" font-size="12" font-weight="bold" fill="white">I/O 调度器</text>
  <text x="375" y="420" text-anchor="middle" font-size="10" fill="#d0e8ff">mq-deadline / kyber / bfq</text>

  <rect x="500" y="382" width="200" height="48" rx="6" fill="#16a085" stroke="#0e6655" stroke-width="1.5"/>
  <text x="600" y="402" text-anchor="middle" font-size="12" font-weight="bold" fill="white">预读机制 (Readahead)</text>
  <text x="600" y="420" text-anchor="middle" font-size="10" fill="#c8f5e8">顺序读时预取后续页</text>

  <rect x="720" y="382" width="130" height="48" rx="6" fill="#c0392b" stroke="#8b1a1a" stroke-width="1.5"/>
  <text x="785" y="402" text-anchor="middle" font-size="12" font-weight="bold" fill="white">kswapd</text>
  <text x="785" y="420" text-anchor="middle" font-size="10" fill="#ffc8c8">内存不足时回收</text>

  <!-- 块设备层 -->
  <rect x="30" y="464" width="840" height="55" rx="8" fill="#34495e" stroke="#2c3e50" stroke-width="1.5"/>
  <text x="450" y="488" text-anchor="middle" font-size="13" font-weight="bold" fill="#ecf0f1">块设备层 (Block Layer)</text>
  <text x="450" y="506" text-anchor="middle" font-size="11" fill="#95a5a6">bio 请求 → 合并/排序 → 设备驱动 → DMA 传输</text>

  <!-- 磁盘 -->
  <rect x="30" y="540" width="840" height="55" rx="8" fill="#1a252f" stroke="#0d1520" stroke-width="1.5"/>
  <text x="200" y="563" text-anchor="middle" font-size="13" font-weight="bold" fill="#ecf0f1">HDD 机械磁盘</text>
  <text x="200" y="581" text-anchor="middle" font-size="10" fill="#7f8c8d">寻道 + 旋转延迟 ~10ms</text>
  <text x="450" y="563" text-anchor="middle" font-size="13" font-weight="bold" fill="#ecf0f1">SSD 固态硬盘</text>
  <text x="450" y="581" text-anchor="middle" font-size="10" fill="#7f8c8d">~0.1ms，NAND Flash</text>
  <text x="720" y="563" text-anchor="middle" font-size="13" font-weight="bold" fill="#ecf0f1">NVMe / Optane</text>
  <text x="720" y="581" text-anchor="middle" font-size="10" fill="#7f8c8d">~0.01ms，PCIe 直连</text>

  <!-- 连接线：用户 → PageCache -->
  <line x1="140" y1="126" x2="140" y2="166" stroke="#4a90d9" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="320" y1="126" x2="280" y2="166" stroke="#4a90d9" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="480" y1="126" x2="400" y2="166" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <line x1="640" y1="126" x2="500" y2="166" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="795" y1="126" x2="600" y2="166" stroke="#f39c12" stroke-width="1.5" marker-end="url(#arr-orange)"/>

  <!-- PageCache → flusher -->
  <line x1="247" y1="328" x2="150" y2="380" stroke="#e74c3c" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr-red)"/>
  <text x="168" y="360" font-size="10" fill="#e74c3c">脏页</text>

  <!-- flusher → I/O调度 -->
  <line x1="250" y1="406" x2="273" y2="406" stroke="#8e44ad" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 回写链 → 块设备 -->
  <line x1="375" y1="430" x2="375" y2="462" stroke="#2980b9" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- 块设备 → 磁盘 -->
  <line x1="450" y1="519" x2="450" y2="538" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 磁盘 → PageCache (读取) -->
  <path d="M 850 567 Q 885 400 850 218" stroke="#27ae60" stroke-width="2" fill="none" stroke-dasharray="7,4" marker-end="url(#arr-green)"/>
  <text x="868" y="400" font-size="10" fill="#27ae60" transform="rotate(-90, 868, 400)">DMA 读取数据到 Page Cache</text>
</svg>
