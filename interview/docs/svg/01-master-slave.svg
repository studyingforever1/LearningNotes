<svg viewBox="0 0 820 460" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e05c2a"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a90d9"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="820" height="460" fill="#f8f9fa" rx="12"/>
  <text x="410" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">Redis 主从复制架构</text>

  <!-- Client -->
  <rect x="30" y="80" width="130" height="60" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="95" y="106" text-anchor="middle" font-size="13" fill="#555">客户端</text>
  <text x="95" y="124" text-anchor="middle" font-size="11" fill="#888">Client</text>

  <!-- Master -->
  <rect x="260" y="60" width="180" height="100" rx="10" fill="#e74c3c" stroke="#c0392b" stroke-width="2" filter="url(#shadow)"/>
  <text x="350" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="white">Master</text>
  <text x="350" y="120" text-anchor="middle" font-size="12" fill="#ffd5d5">读 + 写</text>
  <text x="350" y="140" text-anchor="middle" font-size="11" fill="#ffd5d5">repl_backlog（环形缓冲）</text>

  <!-- Slave 1 -->
  <rect x="560" y="30" width="160" height="80" rx="10" fill="#3498db" stroke="#2980b9" stroke-width="2" filter="url(#shadow)"/>
  <text x="640" y="65" text-anchor="middle" font-size="15" font-weight="bold" fill="white">Slave 1</text>
  <text x="640" y="85" text-anchor="middle" font-size="12" fill="#d6eaf8">只读 (read only)</text>

  <!-- Slave 2 -->
  <rect x="560" y="140" width="160" height="80" rx="10" fill="#3498db" stroke="#2980b9" stroke-width="2" filter="url(#shadow)"/>
  <text x="640" y="175" text-anchor="middle" font-size="15" font-weight="bold" fill="white">Slave 2</text>
  <text x="640" y="195" text-anchor="middle" font-size="12" fill="#d6eaf8">只读 (read only)</text>

  <!-- Slave 3 (cascade) -->
  <rect x="560" y="260" width="160" height="80" rx="10" fill="#8e44ad" stroke="#7d3c98" stroke-width="2" filter="url(#shadow)"/>
  <text x="640" y="292" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Slave 3（级联）</text>
  <text x="640" y="312" text-anchor="middle" font-size="11" fill="#e8d5f5">复制自 Slave 2</text>

  <!-- Client → Master: write -->
  <line x1="160" y1="110" x2="258" y2="110" stroke="#e05c2a" stroke-width="2" marker-end="url(#arr)"/>
  <text x="210" y="102" text-anchor="middle" font-size="11" fill="#e05c2a">写请求</text>

  <!-- Master → Client: read (dashed) -->
  <line x1="260" y1="125" x2="162" y2="125" stroke="#4a90d9" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-blue)"/>
  <text x="210" y="142" text-anchor="middle" font-size="11" fill="#4a90d9">读响应</text>

  <!-- Master → Slave 1 -->
  <line x1="440" y1="85" x2="558" y2="72" stroke="#27ae60" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="500" y="68" text-anchor="middle" font-size="11" fill="#27ae60">命令传播</text>
  <text x="500" y="82" text-anchor="middle" font-size="10" fill="#27ae60">（异步）</text>

  <!-- Master → Slave 2 -->
  <line x1="440" y1="125" x2="558" y2="175" stroke="#27ae60" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- Slave 2 → Slave 3 (cascade) -->
  <line x1="640" y1="220" x2="640" y2="258" stroke="#9b59b6" stroke-width="2" marker-end="url(#arr)"/>
  <text x="665" y="245" font-size="11" fill="#9b59b6">级联复制</text>

  <!-- Slave 1 → Master: ACK -->
  <line x1="560" y1="55" x2="442" y2="75" stroke="#95a5a6" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-blue)"/>
  <text x="502" y="53" text-anchor="middle" font-size="10" fill="#7f8c8d">REPLCONF ACK</text>

  <!-- Phase labels box -->
  <rect x="30" y="360" width="760" height="85" rx="8" fill="#fef9f0" stroke="#f39c12" stroke-width="1.5"/>
  <text x="50" y="382" font-size="13" font-weight="bold" fill="#e67e22">复制三阶段</text>
  <text x="50" y="402" font-size="12" fill="#555">① 建立连接：Socket → PING/PONG → 认证（AUTH）</text>
  <text x="50" y="420" font-size="12" fill="#555">② 数据同步：首次全量（BGSAVE → RDB → 增量追赶）/ 断线重连增量（PSYNC）</text>
  <text x="50" y="438" font-size="12" fill="#555">③ 命令传播：Master 异步推送写命令，Slave 定期回复 REPLCONF ACK &lt;offset&gt;</text>
</svg>
