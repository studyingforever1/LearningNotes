<svg viewBox="0 0 860 420" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
    <filter id="sh" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#00000020"/>
    </filter>
  </defs>

  <rect width="860" height="420" fill="#f8f9fa" rx="12"/>
  <text x="430" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">脑裂问题（Split-Brain）及缓解方案</text>

  <!-- Network partition banner -->
  <rect x="30" y="55" width="800" height="32" rx="6" fill="#fadbd8" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="430" y="76" text-anchor="middle" font-size="13" fill="#922b21">⚡ 网络分区发生：旧 Master 与 Sentinel 多数派失联</text>

  <!-- Partition A -->
  <rect x="30" y="100" width="350" height="180" rx="10" fill="#fef5f5" stroke="#e74c3c" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="205" y="122" text-anchor="middle" font-size="12" font-weight="bold" fill="#e74c3c">分区 A（少数派）</text>

  <rect x="60" y="135" width="130" height="60" rx="8" fill="#c0392b" filter="url(#sh)"/>
  <text x="125" y="161" text-anchor="middle" font-size="13" font-weight="bold" fill="white">旧 Master</text>
  <text x="125" y="179" text-anchor="middle" font-size="11" fill="#fad7d7">继续接受写请求</text>

  <rect x="215" y="135" width="130" height="60" rx="8" fill="#7f8c8d" filter="url(#sh)"/>
  <text x="280" y="161" text-anchor="middle" font-size="12" fill="white">客户端</text>
  <text x="280" y="179" text-anchor="middle" font-size="11" fill="#ddd">写入 W1,W2,W3...</text>

  <line x1="190" y1="165" x2="213" y2="165" stroke="#e74c3c" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="200" y="158" text-anchor="middle" font-size="10" fill="#e74c3c">写</text>

  <rect x="60" y="225" width="290" height="38" rx="6" fill="#fadbd8" stroke="#e74c3c" stroke-width="1"/>
  <text x="205" y="244" text-anchor="middle" font-size="11" fill="#922b21">❌ 旧 Master 孤立但仍提供写服务</text>
  <text x="205" y="260" text-anchor="middle" font-size="11" fill="#922b21">分区恢复后这些写入全部丢失！</text>

  <!-- Partition B -->
  <rect x="480" y="100" width="350" height="180" rx="10" fill="#f0fdf4" stroke="#27ae60" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="655" y="122" text-anchor="middle" font-size="12" font-weight="bold" fill="#27ae60">分区 B（多数派）</text>

  <rect x="495" y="135" width="100" height="50" rx="8" fill="#f39c12" filter="url(#sh)"/>
  <text x="545" y="158" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Sentinel</text>
  <text x="545" y="173" text-anchor="middle" font-size="10" fill="#fef9ee">多数派</text>

  <rect x="615" y="135" width="100" height="50" rx="8" fill="#27ae60" filter="url(#sh)"/>
  <text x="665" y="158" text-anchor="middle" font-size="12" font-weight="bold" fill="white">新 Master</text>
  <text x="665" y="173" text-anchor="middle" font-size="10" fill="#d5f5e3">Slave 晋升</text>

  <rect x="730" y="135" width="90" height="50" rx="8" fill="#3498db" filter="url(#sh)"/>
  <text x="775" y="158" text-anchor="middle" font-size="12" fill="white">Slave</text>
  <text x="775" y="173" text-anchor="middle" font-size="10" fill="#d6eaf8">正常</text>

  <line x1="597" y1="160" x2="613" y2="160" stroke="#27ae60" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="717" y1="160" x2="732" y2="160" stroke="#27ae60" stroke-width="2" marker-end="url(#arr-green)"/>

  <rect x="495" y="225" width="325" height="38" rx="6" fill="#d5f5e3" stroke="#27ae60" stroke-width="1"/>
  <text x="657" y="244" text-anchor="middle" font-size="11" fill="#1e8449">✅ Sentinel 正常工作，选出新 Master</text>
  <text x="657" y="260" text-anchor="middle" font-size="11" fill="#1e8449">分区 B 数据写入正常进行</text>

  <!-- Partition wall -->
  <line x1="415" y1="95" x2="415" y2="290" stroke="#e74c3c" stroke-width="3" stroke-dasharray="8,5"/>
  <text x="420" y="200" font-size="22" fill="#e74c3c">⚡</text>

  <!-- Solution box -->
  <rect x="30" y="300" width="800" height="105" rx="10" fill="#eaf4fb" stroke="#2980b9" stroke-width="2"/>
  <text x="430" y="322" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a5276">✅ 缓解方案：min-replicas-to-write + min-replicas-max-lag</text>

  <text x="50" y="345" font-size="12" fill="#1a5276">配置：</text>
  <rect x="110" y="330" width="360" height="32" rx="5" fill="#2c3e50"/>
  <text x="290" y="348" text-anchor="middle" font-size="12" fill="#a8ff78" font-family="monospace">min-replicas-to-write 1    min-replicas-max-lag 10</text>

  <text x="50" y="372" font-size="12" fill="#555">原理：旧 Master 被孤立 → 无 Slave 可达 → 连接 Slave 数 &lt; min-replicas-to-write → 拒绝所有写请求</text>
  <text x="50" y="390" font-size="12" fill="#555">效果：数据丢失窗口从"整个分区持续时间"缩小为 min-replicas-max-lag（10s）内的写入</text>
  <text x="50" y="408" font-size="12" fill="#e74c3c">注意：代价是如果 Slave 全断连，正常情况下 Master 也会拒绝写（可用性换一致性）</text>
</svg>
