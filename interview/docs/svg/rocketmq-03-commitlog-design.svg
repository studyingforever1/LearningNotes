<svg viewBox="0 0 960 660" xmlns="http://www.w3.org/2000/svg" font-family="'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c0392b"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#27ae60"/>
    </marker>
  </defs>

  <rect width="960" height="660" fill="#f8f9fa" rx="8"/>
  <rect x="0" y="0" width="960" height="50" fill="#2c3e50" rx="8"/>
  <rect x="0" y="40" width="960" height="10" fill="#2c3e50"/>
  <text x="480" y="32" text-anchor="middle" fill="white" font-size="20" font-weight="bold">为什么 RocketMQ 所有 Topic 共用一个 CommitLog</text>

  <!-- 左侧：Kafka 方案 -->
  <g transform="translate(30, 80)">
    <rect x="0" y="0" width="430" height="500" fill="#fff" stroke="#bdc3c7" stroke-width="2" rx="8"/>
    <rect x="0" y="0" width="430" height="40" fill="#c0392b" rx="8"/>
    <rect x="0" y="32" width="430" height="8" fill="#c0392b"/>
    <text x="215" y="26" text-anchor="middle" fill="white" font-size="15" font-weight="bold">Kafka 方案：每 Partition 一个文件</text>

    <!-- Topic A -->
    <text x="20" y="68" font-size="12" font-weight="bold" fill="#555">Topic A · Partition 0</text>
    <rect x="20" y="76" width="390" height="32" fill="#aed6f1" stroke="#2980b9"/>
    <text x="215" y="97" text-anchor="middle" font-size="11" fill="#1b4f72">→ → → 顺序写</text>

    <text x="20" y="128" font-size="12" font-weight="bold" fill="#555">Topic A · Partition 1</text>
    <rect x="20" y="136" width="390" height="32" fill="#aed6f1" stroke="#2980b9"/>
    <text x="215" y="157" text-anchor="middle" font-size="11" fill="#1b4f72">→ → → 顺序写</text>

    <text x="20" y="188" font-size="12" font-weight="bold" fill="#555">Topic B · Partition 0</text>
    <rect x="20" y="196" width="390" height="32" fill="#f5cba7" stroke="#d35400"/>
    <text x="215" y="217" text-anchor="middle" font-size="11" fill="#7e3a07">→ → → 顺序写</text>

    <text x="20" y="248" font-size="12" font-weight="bold" fill="#555">Topic C · Partition 0  ...  共 N 个 Partition</text>
    <rect x="20" y="256" width="390" height="32" fill="#d7bde2" stroke="#7d3c98"/>
    <text x="215" y="277" text-anchor="middle" font-size="11" fill="#4a235a">→ → → 顺序写</text>

    <!-- 磁盘头跳转示意 -->
    <g transform="translate(20, 310)">
      <text x="195" y="0" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">磁盘视角（N 个文件并发写）</text>
      <rect x="0" y="14" width="390" height="60" fill="#fadbd8" stroke="#c0392b" stroke-width="1.5" rx="4"/>
      <path d="M 20 60 Q 80 20, 140 50 T 260 35 T 370 55" stroke="#c0392b" stroke-width="2" fill="none" marker-end="url(#arrow-red)"/>
      <circle cx="20" cy="60" r="4" fill="#c0392b"/>
      <text x="195" y="92" text-anchor="middle" font-size="11" fill="#922b21">磁头在多文件间反复跳转 → 退化为随机写</text>
    </g>

    <g transform="translate(20, 410)">
      <text x="0" y="0" font-size="12" font-weight="bold" fill="#c0392b">结果</text>
      <text x="0" y="20" font-size="11" fill="#555">• Topic 几十个 OK，上千个性能急剧下降</text>
      <text x="0" y="40" font-size="11" fill="#555">• 单机吞吐高（单 Topic 100w+ TPS）</text>
      <text x="0" y="60" font-size="11" fill="#555">• 但<tspan font-weight="bold" fill="#c0392b">不擅长万级 Topic</tspan> 的业务消息场景</text>
    </g>
  </g>

  <!-- 右侧：RocketMQ 方案 -->
  <g transform="translate(500, 80)">
    <rect x="0" y="0" width="430" height="500" fill="#fff" stroke="#bdc3c7" stroke-width="2" rx="8"/>
    <rect x="0" y="0" width="430" height="40" fill="#27ae60" rx="8"/>
    <rect x="0" y="32" width="430" height="8" fill="#27ae60"/>
    <text x="215" y="26" text-anchor="middle" fill="white" font-size="15" font-weight="bold">RocketMQ 方案：所有 Topic 共用 CommitLog</text>

    <!-- 多 Topic 写入 -->
    <text x="20" y="68" font-size="12" font-weight="bold" fill="#555">Topic A / B / C / ... 全部追加到同一个 CommitLog</text>

    <g transform="translate(20, 80)">
      <rect x="0" y="0" width="60" height="28" fill="#aed6f1" stroke="#2980b9"/>
      <text x="30" y="18" text-anchor="middle" font-size="10" fill="#1b4f72">TopicA</text>

      <rect x="62" y="0" width="60" height="28" fill="#f5cba7" stroke="#d35400"/>
      <text x="92" y="18" text-anchor="middle" font-size="10" fill="#7e3a07">TopicB</text>

      <rect x="124" y="0" width="60" height="28" fill="#d7bde2" stroke="#7d3c98"/>
      <text x="154" y="18" text-anchor="middle" font-size="10" fill="#4a235a">TopicC</text>

      <rect x="186" y="0" width="60" height="28" fill="#aed6f1" stroke="#2980b9"/>
      <text x="216" y="18" text-anchor="middle" font-size="10" fill="#1b4f72">TopicA</text>

      <rect x="248" y="0" width="60" height="28" fill="#f5cba7" stroke="#d35400"/>
      <text x="278" y="18" text-anchor="middle" font-size="10" fill="#7e3a07">TopicB</text>

      <rect x="310" y="0" width="60" height="28" fill="#d7bde2" stroke="#7d3c98"/>
      <text x="340" y="18" text-anchor="middle" font-size="10" fill="#4a235a">TopicC</text>
    </g>

    <text x="215" y="138" text-anchor="middle" font-size="11" fill="#196f3d">↓ 全部追加到同一个文件</text>

    <!-- 单一 CommitLog -->
    <g transform="translate(20, 150)">
      <rect x="0" y="0" width="390" height="50" fill="#d5f5e3" stroke="#27ae60" stroke-width="2"/>
      <text x="195" y="22" text-anchor="middle" font-size="13" font-weight="bold" fill="#196f3d">CommitLog (1 GB / 文件)</text>
      <text x="195" y="40" text-anchor="middle" font-size="11" fill="#196f3d">→ → → → → → 严格顺序追加 → → → → → →</text>
    </g>

    <!-- 磁盘视角 -->
    <g transform="translate(20, 220)">
      <text x="195" y="0" text-anchor="middle" font-size="12" font-weight="bold" fill="#196f3d">磁盘视角（单文件顺序写）</text>
      <rect x="0" y="14" width="390" height="60" fill="#d5f5e3" stroke="#27ae60" stroke-width="1.5" rx="4"/>
      <line x1="20" y1="44" x2="370" y2="44" stroke="#27ae60" stroke-width="3" marker-end="url(#arrow-green)"/>
      <text x="195" y="92" text-anchor="middle" font-size="11" fill="#196f3d">磁头始终向后移动 → 真正的顺序 IO</text>
    </g>

    <!-- 代价 -->
    <g transform="translate(20, 320)">
      <text x="0" y="0" font-size="12" font-weight="bold" fill="#196f3d">代价：消费时需要二级索引</text>

      <rect x="0" y="14" width="390" height="60" fill="#fef9e7" stroke="#f1c40f" stroke-width="1.5" rx="4"/>
      <text x="195" y="36" text-anchor="middle" font-size="11" fill="#7d6608">ConsumeQueue (每 Topic-Queue 一个)</text>
      <text x="195" y="56" text-anchor="middle" font-size="10" fill="#7d6608">异步派发，仅 20B / 条，开销极小</text>
    </g>

    <g transform="translate(20, 410)">
      <text x="0" y="0" font-size="12" font-weight="bold" fill="#196f3d">结果</text>
      <text x="0" y="20" font-size="11" fill="#555">• 单机<tspan font-weight="bold" fill="#196f3d">万级 Topic</tspan> 性能稳定</text>
      <text x="0" y="40" font-size="11" fill="#555">• 单机吞吐 10w 级，适合业务消息</text>
      <text x="0" y="60" font-size="11" fill="#555">• 顺序写 + 海量堆积不掉速</text>
    </g>
  </g>

  <!-- 底部结论 -->
  <g transform="translate(30, 600)">
    <rect x="0" y="0" width="900" height="44" fill="#2c3e50" rx="6"/>
    <text x="450" y="20" text-anchor="middle" font-size="12" fill="white">核心权衡：用 ConsumeQueue 异步派发的小代价，换取 Topic 数量上去后磁盘的真正顺序写</text>
    <text x="450" y="36" text-anchor="middle" font-size="11" fill="#f1c40f">"业务消息中间件" vs "大数据流处理平台" 在存储设计上的根本分歧</text>
  </g>
</svg>
