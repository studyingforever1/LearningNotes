<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="60" x2="1200" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FBFF"/>
      <stop offset="1" stop-color="#EEF7F2"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#155E75"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 30px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #0F172A; }
      .subtitle { font: 400 15px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #475569; }
      .box-title { font: 700 20px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #0F172A; }
      .box-text { font: 400 15px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #334155; }
      .core-title { font: 700 24px "Microsoft YaHei", "PingFang SC", sans-serif; fill: white; }
      .core-text { font: 400 16px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #D9F99D; }
      .small { font: 400 14px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #475569; }
      .arrow { stroke: #0F766E; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
    </style>
    <marker id="arrowHead" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M1 1L10 6L1 11" fill="none" stroke="#0F766E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1280" height="760" rx="28" fill="url(#bg)"/>
  <text x="72" y="78" class="title">授权项目全景图</text>
  <text x="72" y="108" class="subtitle">基于代码结构整理出的角色、模块与平台能力关系</text>

  <rect x="64" y="170" width="250" height="160" rx="20" fill="#FFFFFF" stroke="#CFE7D8" filter="url(#shadow)"/>
  <text x="92" y="214" class="box-title">接入方与使用方</text>
  <text x="92" y="248" class="box-text">企业员工 / 管理员</text>
  <text x="92" y="276" class="box-text">OA / 销售 / BI / AI 系统</text>
  <text x="92" y="304" class="box-text">设备终端 / 企业微信应用</text>

  <rect x="64" y="402" width="250" height="208" rx="20" fill="#FFFFFF" stroke="#D9E2F2" filter="url(#shadow)"/>
  <text x="92" y="446" class="box-title">配套资产</text>
  <text x="92" y="480" class="box-text">`authorization-doc` 文档站</text>
  <text x="92" y="508" class="box-text">`http-client` 联调脚本</text>
  <text x="92" y="536" class="box-text">`sql` 初始化与增量脚本</text>
  <text x="92" y="564" class="box-text">`authorization-client` 示例客户端</text>
  <text x="92" y="592" class="box-text">`resource-server` 历史示例产物</text>

  <rect x="392" y="128" width="500" height="512" rx="28" fill="url(#core)" filter="url(#shadow)"/>
  <text x="428" y="186" class="core-title">authorization-server</text>
  <text x="428" y="218" class="core-text">统一认证、授权、权限治理与平台接入核心</text>

  <rect x="428" y="252" width="428" height="84" rx="18" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.22)"/>
  <text x="452" y="286" class="box-title" fill="white">认证与协议层</text>
  <text x="452" y="314" class="box-text" fill="#E2E8F0">OAuth2/OIDC、授权码、PKCE、设备码、Refresh Token、企业微信授权码</text>

  <rect x="428" y="356" width="428" height="84" rx="18" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.22)"/>
  <text x="452" y="390" class="box-title" fill="white">平台治理层</text>
  <text x="452" y="418" class="box-text" fill="#E2E8F0">客户端管理、统一退出、用户/角色/权限/用户组/菜单/操作/数据集</text>

  <rect x="428" y="460" width="428" height="84" rx="18" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.22)"/>
  <text x="452" y="494" class="box-title" fill="white">运行时保障层</text>
  <text x="452" y="522" class="box-text" fill="#E2E8F0">数据权限拦截、接口限流、验证码、日志、缓存、分布式锁、定时任务</text>

  <rect x="944" y="120" width="270" height="156" rx="20" fill="#FFFFFF" stroke="#E6DCC7" filter="url(#shadow)"/>
  <text x="972" y="164" class="box-title">数据与缓存</text>
  <text x="972" y="198" class="box-text">MySQL</text>
  <text x="972" y="226" class="box-text">Redis / Redisson</text>
  <text x="972" y="254" class="box-text">授权、权限、验证码、缓存</text>

  <rect x="944" y="318" width="270" height="156" rx="20" fill="#FFFFFF" stroke="#D5DDF1" filter="url(#shadow)"/>
  <text x="972" y="362" class="box-title">集成与消息</text>
  <text x="972" y="396" class="box-text">Nacos / OpenFeign / HttpClient5</text>
  <text x="972" y="424" class="box-text">RocketMQ / XXL-Job</text>
  <text x="972" y="452" class="box-text">OA、AI、日志与同步任务</text>

  <rect x="944" y="516" width="270" height="156" rx="20" fill="#FFFFFF" stroke="#CDE4EF" filter="url(#shadow)"/>
  <text x="972" y="560" class="box-title">观测与文档</text>
  <text x="972" y="594" class="box-text">Actuator / Micrometer / Prometheus</text>
  <text x="972" y="622" class="box-text">SkyWalking / SpringDoc</text>
  <text x="972" y="650" class="box-text">日志、指标、链路、接口说明</text>

  <path d="M314 250H372" class="arrow" marker-end="url(#arrowHead)"/>
  <path d="M314 506H372" class="arrow" marker-end="url(#arrowHead)"/>
  <path d="M892 198H926" class="arrow" marker-end="url(#arrowHead)"/>
  <path d="M892 398H926" class="arrow" marker-end="url(#arrowHead)"/>
  <path d="M892 594H926" class="arrow" marker-end="url(#arrowHead)"/>

  <text x="514" y="696" class="small">核心判断：项目已从统一登录中心演进为企业级统一认证授权平台</text>
</svg>
