<svg viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg" font-family="'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>

  <rect width="900" height="580" fill="#f8f9fa" rx="8"/>

  <!-- 标题 -->
  <rect x="0" y="0" width="900" height="50" fill="#9b59b6" rx="8"/>
  <rect x="0" y="40" width="900" height="10" fill="#9b59b6"/>
  <text x="450" y="32" text-anchor="middle" fill="white" font-size="19" font-weight="bold">四种 Suggester 对比 与 应用场景选择</text>

  <!-- 对比表格 -->
  <rect x="20" y="65" width="860" height="285" rx="10" fill="white" stroke="#bdc3c7" stroke-width="2"/>

  <!-- 表头 -->
  <rect x="20" y="65" width="860" height="35" rx="10" fill="#2c3e50"/>
  <rect x="20" y="88" width="860" height="12" fill="#2c3e50"/>
  <text x="120" y="88" text-anchor="middle" fill="white" font-size="13" font-weight="bold">类型</text>
  <text x="295" y="88" text-anchor="middle" fill="white" font-size="13" font-weight="bold">底层结构</text>
  <text x="450" y="88" text-anchor="middle" fill="white" font-size="13" font-weight="bold">适用场景</text>
  <text x="620" y="88" text-anchor="middle" fill="white" font-size="13" font-weight="bold">性能</text>
  <text x="770" y="88" text-anchor="middle" fill="white" font-size="13" font-weight="bold">局限性</text>

  <!-- 分割线 -->
  <line x1="200" y1="65" x2="200" y2="350" stroke="#ddd" stroke-width="1"/>
  <line x1="380" y1="65" x2="380" y2="350" stroke="#ddd" stroke-width="1"/>
  <line x1="540" y1="65" x2="540" y2="350" stroke="#ddd" stroke-width="1"/>
  <line x1="710" y1="65" x2="710" y2="350" stroke="#ddd" stroke-width="1"/>

  <!-- Row 1: Term Suggester -->
  <rect x="20" y="100" width="860" height="55" fill="#fef9e7"/>
  <rect x="25" y="105" width="165" height="42" rx="6" fill="#f39c12"/>
  <text x="107" y="123" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Term Suggester</text>
  <text x="107" y="139" text-anchor="middle" fill="white" font-size="10">词项推荐</text>

  <text x="210" y="120" fill="#555" font-size="10">倒排索引</text>
  <text x="210" y="136" fill="#555" font-size="10">Levenshtein</text>
  <text x="210" y="152" fill="#555" font-size="10">编辑距离算法</text>

  <text x="390" y="120" fill="#555" font-size="10">搜索词拼写纠错</text>
  <text x="390" y="136" fill="#555" font-size="10">单词层面的"您是否要找"</text>
  <text x="390" y="152" fill="#555" font-size="10">如 "elstc" → "elastic"</text>

  <rect x="548" y="108" width="55" height="20" rx="4" fill="#f39c12"/>
  <text x="575" y="122" text-anchor="middle" fill="white" font-size="10">中等</text>
  <text x="620" y="143" fill="#555" font-size="9">~30-80ms</text>
  <text x="620" y="156" fill="#555" font-size="9">随词典大小增加</text>

  <text x="720" y="120" fill="#777" font-size="9">每词独立纠错</text>
  <text x="720" y="136" fill="#777" font-size="9">忽略词间关系</text>
  <text x="720" y="152" fill="#777" font-size="9">无法处理多词语义</text>

  <!-- Row 2: Phrase Suggester -->
  <rect x="20" y="155" width="860" height="55" fill="white"/>
  <rect x="25" y="160" width="165" height="42" rx="6" fill="#27ae60"/>
  <text x="107" y="178" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Phrase Suggester</text>
  <text x="107" y="194" text-anchor="middle" fill="white" font-size="10">短语推荐</text>

  <text x="210" y="175" fill="#555" font-size="10">倒排索引</text>
  <text x="210" y="191" fill="#555" font-size="10">Shingle N-gram</text>
  <text x="210" y="207" fill="#555" font-size="10">语言模型</text>

  <text x="390" y="175" fill="#555" font-size="10">整句/短语纠错</text>
  <text x="390" y="191" fill="#555" font-size="10">考虑词与词的搭配</text>
  <text x="390" y="207" fill="#555" font-size="10">"java progamming"纠错</text>

  <rect x="548" y="163" width="55" height="20" rx="4" fill="#e67e22"/>
  <text x="575" y="177" text-anchor="middle" fill="white" font-size="10">较慢</text>
  <text x="620" y="198" fill="#555" font-size="9">~80-150ms</text>
  <text x="620" y="211" fill="#555" font-size="9">N-gram计算开销大</text>

  <text x="720" y="175" fill="#777" font-size="9">需预构建shingle</text>
  <text x="720" y="191" fill="#777" font-size="9">索引体积增大</text>
  <text x="720" y="207" fill="#777" font-size="9">配置较复杂</text>

  <!-- Row 3: Completion Suggester -->
  <rect x="20" y="210" width="860" height="55" fill="#fef9e7"/>
  <rect x="25" y="215" width="165" height="42" rx="6" fill="#e74c3c"/>
  <text x="107" y="233" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Completion</text>
  <text x="107" y="249" text-anchor="middle" fill="white" font-size="10">自动补全</text>

  <text x="210" y="230" fill="#555" font-size="10">FST有限状态</text>
  <text x="210" y="246" fill="#555" font-size="10">转换器</text>
  <text x="210" y="262" fill="#555" font-size="10">常驻内存</text>

  <text x="390" y="230" fill="#555" font-size="10">搜索框实时补全</text>
  <text x="390" y="246" fill="#555" font-size="10">输入即搜的交互体验</text>
  <text x="390" y="262" fill="#555" font-size="10">"java" → "java spring"</text>

  <rect x="548" y="218" width="55" height="20" rx="4" fill="#27ae60"/>
  <text x="575" y="232" text-anchor="middle" fill="white" font-size="10">极快</text>
  <text x="620" y="253" fill="#555" font-size="9">&lt;10ms</text>
  <text x="620" y="266" fill="#555" font-size="9">内存查询</text>

  <text x="720" y="230" fill="#777" font-size="9">不支持模糊匹配</text>
  <text x="720" y="246" fill="#777" font-size="9">必须从头部前缀</text>
  <text x="720" y="262" fill="#777" font-size="9">内存消耗较高</text>

  <!-- Row 4: Context Suggester -->
  <rect x="20" y="265" width="860" height="55" fill="white"/>
  <rect x="25" y="270" width="165" height="42" rx="6" fill="#9b59b6"/>
  <text x="107" y="288" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Context Suggester</text>
  <text x="107" y="304" text-anchor="middle" fill="white" font-size="10">上下文推荐</text>

  <text x="210" y="285" fill="#555" font-size="10">FST + 上下文</text>
  <text x="210" y="301" fill="#555" font-size="10">过滤（分类/</text>
  <text x="210" y="317" fill="#555" font-size="10">地理位置）</text>

  <text x="390" y="285" fill="#555" font-size="10">按场景过滤推荐</text>
  <text x="390" y="301" fill="#555" font-size="10">电商按类目/地理位置</text>
  <text x="390" y="317" fill="#555" font-size="10">个性化差异化推荐</text>

  <rect x="548" y="273" width="55" height="20" rx="4" fill="#27ae60"/>
  <text x="575" y="287" text-anchor="middle" fill="white" font-size="10">极快</text>
  <text x="620" y="308" fill="#555" font-size="9">&lt;20ms</text>
  <text x="620" y="321" fill="#555" font-size="9">在Completion基础上</text>

  <text x="720" y="285" fill="#777" font-size="9">Completion的超集</text>
  <text x="720" y="301" fill="#777" font-size="9">需在写入时</text>
  <text x="720" y="317" fill="#777" font-size="9">预设上下文值</text>

  <!-- 分割线 -->
  <line x1="20" y1="155" x2="880" y2="155" stroke="#ddd" stroke-width="1"/>
  <line x1="20" y1="210" x2="880" y2="210" stroke="#ddd" stroke-width="1"/>
  <line x1="20" y1="265" x2="880" y2="265" stroke="#ddd" stroke-width="1"/>

  <!-- 选型指导 -->
  <rect x="20" y="365" width="860" height="200" rx="10" fill="white" stroke="#3498db" stroke-width="2"/>
  <rect x="20" y="365" width="860" height="35" rx="10" fill="#3498db"/>
  <rect x="20" y="388" width="860" height="12" fill="#3498db"/>
  <text x="450" y="388" text-anchor="middle" fill="white" font-size="14" font-weight="bold">选型决策树 — 如何选择合适的 Suggester</text>

  <!-- 决策树 -->
  <!-- 问题1 -->
  <rect x="355" y="412" width="190" height="35" rx="8" fill="#2c3e50"/>
  <text x="450" y="427" text-anchor="middle" fill="white" font-size="11" font-weight="bold">是否需要实时自动补全?</text>
  <text x="450" y="442" text-anchor="middle" fill="#ccc" font-size="9">边输入边显示下拉候选词</text>

  <!-- Yes分支 -->
  <line x1="450" y1="447" x2="280" y2="470" stroke="#27ae60" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="340" y="462" fill="#27ae60" font-size="10" font-weight="bold">是</text>

  <!-- No分支 -->
  <line x1="450" y1="447" x2="620" y2="470" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="560" y="462" fill="#e74c3c" font-size="10" font-weight="bold">否（用于纠错）</text>

  <!-- 是分支：需要按场景区分? -->
  <rect x="165" y="470" width="220" height="35" rx="8" fill="#27ae60"/>
  <text x="275" y="485" text-anchor="middle" fill="white" font-size="11">需要按分类/位置过滤?</text>
  <text x="275" y="500" text-anchor="middle" fill="#d5f5e3" font-size="9">如"技术类"/"北京附近"</text>

  <line x1="215" y1="505" x2="175" y2="525" stroke="#9b59b6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="330" y1="505" x2="355" y2="525" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="120" y="525" width="100" height="30" rx="6" fill="#9b59b6"/>
  <text x="170" y="544" text-anchor="middle" fill="white" font-size="11">Context</text>

  <rect x="310" y="525" width="105" height="30" rx="6" fill="#e74c3c"/>
  <text x="362" y="544" text-anchor="middle" fill="white" font-size="11">Completion</text>

  <!-- 否分支：纠错范围? -->
  <rect x="510" y="470" width="220" height="35" rx="8" fill="#e74c3c"/>
  <text x="620" y="485" text-anchor="middle" fill="white" font-size="11">需要整句纠错还是单词?</text>
  <text x="620" y="500" text-anchor="middle" fill="#fadbd8" font-size="9">整句 vs 单词</text>

  <line x1="565" y1="505" x2="540" y2="525" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="675" y1="505" x2="700" y2="525" stroke="#f39c12" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="485" y="525" width="100" height="30" rx="6" fill="#27ae60"/>
  <text x="535" y="544" text-anchor="middle" fill="white" font-size="11">Phrase</text>

  <rect x="660" y="525" width="80" height="30" rx="6" fill="#f39c12"/>
  <text x="700" y="544" text-anchor="middle" fill="white" font-size="11">Term</text>

  <!-- 组合使用提示 -->
  <rect x="20" y="350" width="860" height="13" rx="4" fill="#e8f4fd" stroke="#3498db" stroke-width="1"/>
  <text x="450" y="361" text-anchor="middle" fill="#2980b9" font-size="10">实际项目常组合使用：Completion（自动补全）+ Term/Phrase（搜索结果页纠错提示）</text>
</svg>
