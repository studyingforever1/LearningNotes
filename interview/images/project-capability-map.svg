<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="40" y1="40" x2="1240" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFDF7"/>
      <stop offset="1" stop-color="#F4F8FF"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
    <style>
      .title { font: 700 30px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #111827; }
      .subtitle { font: 400 15px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #4B5563; }
      .cardTitle { font: 700 21px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #111827; }
      .line { font: 400 15px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #374151; }
      .centerTitle { font: 700 28px "Microsoft YaHei", "PingFang SC", sans-serif; fill: white; }
      .centerText { font: 400 16px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #E0F2FE; }
      .cap { font: 700 14px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #0F172A; }
      .arrow { stroke: #2563EB; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
    </style>
    <marker id="arrowHead2" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M1 1L10 6L1 11" fill="none" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1280" height="760" rx="28" fill="url(#bg2)"/>
  <text x="70" y="78" class="title">能力版图与技术支撑</text>
  <text x="70" y="108" class="subtitle">从“为什么做”到“靠什么做”的映射</text>

  <rect x="470" y="220" width="340" height="300" rx="34" fill="#1D4ED8" filter="url(#shadow2)"/>
  <text x="530" y="292" class="centerTitle">统一认证授权平台</text>
  <text x="528" y="332" class="centerText">OAuth2/OIDC 为协议底座</text>
  <text x="528" y="360" class="centerText">认证、授权、权限、数据治理合一</text>
  <text x="528" y="388" class="centerText">支持企业微信、设备端、系统间调用</text>

  <rect x="90" y="136" width="286" height="178" rx="22" fill="#FFFFFF" stroke="#F0D9A8" filter="url(#shadow2)"/>
  <text x="118" y="182" class="cardTitle">背景</text>
  <text x="118" y="216" class="line">多业务系统并存</text>
  <text x="118" y="244" class="line">统一登录与统一密钥诉求强</text>
  <text x="118" y="272" class="line">开放接口越来越多</text>

  <rect x="90" y="422" width="286" height="212" rx="22" fill="#FFFFFF" stroke="#B9D9F7" filter="url(#shadow2)"/>
  <text x="118" y="468" class="cardTitle">痛点</text>
  <text x="118" y="502" class="line">登录链路分散，重复建设</text>
  <text x="118" y="530" class="line">不同终端授权模式不统一</text>
  <text x="118" y="558" class="line">权限与数据权限难集中治理</text>
  <text x="118" y="586" class="line">开放接口缺少限流与审计</text>

  <rect x="904" y="108" width="286" height="220" rx="22" fill="#FFFFFF" stroke="#BDE2CA" filter="url(#shadow2)"/>
  <text x="932" y="154" class="cardTitle">能力</text>
  <text x="932" y="188" class="line">授权码 / PKCE / 客户端模式</text>
  <text x="932" y="216" class="line">Refresh Token / 设备码</text>
  <text x="932" y="244" class="line">企业微信授权码</text>
  <text x="932" y="272" class="line">统一退出 / JWK / UserInfo</text>
  <text x="932" y="300" class="line">RBAC + 数据权限 + 管理后台</text>

  <rect x="904" y="380" width="286" height="254" rx="22" fill="#FFFFFF" stroke="#D7D6F8" filter="url(#shadow2)"/>
  <text x="932" y="426" class="cardTitle">技术支撑</text>
  <text x="932" y="460" class="line">Spring Boot / Spring Cloud</text>
  <text x="932" y="488" class="line">MyBatis / MySQL / Redis / Redisson</text>
  <text x="932" y="516" class="line">OpenFeign / RocketMQ / XXL-Job</text>
  <text x="932" y="544" class="line">Micrometer / Prometheus / SkyWalking</text>
  <text x="932" y="572" class="line">SpringDoc / Aviator / Easy Captcha</text>

  <path d="M376 224H450" class="arrow" marker-end="url(#arrowHead2)"/>
  <path d="M376 528H450" class="arrow" marker-end="url(#arrowHead2)"/>
  <path d="M810 260H888" class="arrow" marker-end="url(#arrowHead2)"/>
  <path d="M810 514H888" class="arrow" marker-end="url(#arrowHead2)"/>

  <rect x="488" y="552" width="304" height="110" rx="18" fill="#FFFFFF" stroke="#D1D5DB" filter="url(#shadow2)"/>
  <text x="514" y="590" class="cap">当前判断</text>
  <text x="514" y="618" class="line">核心能力已经成型，正在从“认证中心”</text>
  <text x="514" y="644" class="line">继续扩展到“权限治理中心 + 平台入口”</text>
</svg>
