<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="700" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#555"/></marker>
    <marker id="ab" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#2980b9"/></marker>
    <marker id="ag" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#27ae60"/></marker>
    <marker id="ar" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#e74c3c"/></marker>
    <marker id="ao" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#e67e22"/></marker>
    <marker id="aw" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#ecf0f1"/></marker>
  </defs>

  <!-- 背景 -->
  <rect width="1000" height="700" fill="#1a1a2e" rx="0"/>

  <!-- 标题 -->
  <text x="500" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#ecf0f1">Linux 内存管理全景图</text>
  <text x="500" y="58" text-anchor="middle" font-size="12" fill="#7f8c8d">进程 · 虚拟内存 · Page Cache · 网络 · CPU · 磁盘</text>

  <!-- ============ CPU 区域 ============ -->
  <rect x="20" y="75" width="300" height="190" rx="10" fill="#2c3e50" stroke="#4a90d9" stroke-width="2"/>
  <text x="170" y="98" text-anchor="middle" font-size="13" font-weight="bold" fill="#4a90d9">CPU</text>

  <!-- 寄存器/流水线 -->
  <rect x="35" y="108" width="125" height="38" rx="5" fill="#e74c3c" stroke="#c0392b" stroke-width="1"/>
  <text x="97" y="124" text-anchor="middle" font-size="10" font-weight="bold" fill="white">寄存器 / 流水线</text>
  <text x="97" y="139" text-anchor="middle" font-size="9" fill="#ffc8c8">~0.3ns</text>

  <rect x="170" y="108" width="135" height="38" rx="5" fill="#c0392b" stroke="#8b1a1a" stroke-width="1"/>
  <text x="237" y="124" text-anchor="middle" font-size="10" font-weight="bold" fill="white">MMU / TLB</text>
  <text x="237" y="139" text-anchor="middle" font-size="9" fill="#ffc8c8">虚拟→物理地址</text>

  <rect x="35" y="155" width="125" height="38" rx="5" fill="#e74c3c" stroke="#c0392b" stroke-width="1" opacity="0.9"/>
  <text x="97" y="171" text-anchor="middle" font-size="10" font-weight="bold" fill="white">L1 Cache</text>
  <text x="97" y="185" text-anchor="middle" font-size="9" fill="#ffc8c8">32KB  ~1ns</text>

  <rect x="170" y="155" width="135" height="38" rx="5" fill="#e67e22" stroke="#ca6f1e" stroke-width="1"/>
  <text x="237" y="171" text-anchor="middle" font-size="10" font-weight="bold" fill="white">L2 Cache</text>
  <text x="237" y="185" text-anchor="middle" font-size="9" fill="#ffe8cc">256KB  ~4ns</text>

  <rect x="35" y="202" width="270" height="38" rx="5" fill="#8e44ad" stroke="#5d2d7a" stroke-width="1.5"/>
  <text x="170" y="219" text-anchor="middle" font-size="10" font-weight="bold" fill="white">L3 Cache（所有核心共享）</text>
  <text x="170" y="233" text-anchor="middle" font-size="9" fill="#e8c8ff">8~64MB  ~10ns  MESI 一致性协议</text>

  <!-- ============ 进程虚拟内存 ============ -->
  <rect x="340" y="75" width="220" height="190" rx="10" fill="#2c3e50" stroke="#27ae60" stroke-width="2"/>
  <text x="450" y="98" text-anchor="middle" font-size="13" font-weight="bold" fill="#27ae60">进程虚拟地址空间</text>

  <rect x="355" y="108" width="190" height="26" rx="4" fill="#e74c3c" stroke="#c0392b" stroke-width="1"/>
  <text x="450" y="125" text-anchor="middle" font-size="10" fill="white">栈 Stack ↓ (8MB)</text>

  <rect x="355" y="138" width="190" height="26" rx="4" fill="#9b59b6" stroke="#5d2d7a" stroke-width="1"/>
  <text x="450" y="155" text-anchor="middle" font-size="10" fill="white">mmap 区（共享库/文件映射）</text>

  <rect x="355" y="168" width="190" height="26" rx="4" fill="#27ae60" stroke="#1a7a42" stroke-width="1"/>
  <text x="450" y="185" text-anchor="middle" font-size="10" fill="white">堆 Heap ↑ (malloc/new)</text>

  <rect x="355" y="198" width="190" height="26" rx="4" fill="#f39c12" stroke="#d68910" stroke-width="1"/>
  <text x="450" y="215" text-anchor="middle" font-size="10" fill="white">BSS / Data 段</text>

  <rect x="355" y="228" width="190" height="26" rx="4" fill="#2980b9" stroke="#1a5276" stroke-width="1"/>
  <text x="450" y="245" text-anchor="middle" font-size="10" fill="white">Text 代码段 (r-x)</text>

  <!-- ============ 内核核心 ============ -->
  <rect x="20" y="285" width="840" height="65" rx="10" fill="#16213e" stroke="#e67e22" stroke-width="2"/>
  <text x="440" y="308" text-anchor="middle" font-size="14" font-weight="bold" fill="#e67e22">内核虚拟内存管理子系统（VMM）</text>
  <text x="440" y="328" text-anchor="middle" font-size="11" fill="#888">缺页处理 | Buddy System 物理页分配 | Slab 分配器 | VMA 管理 | kswapd 内存回收 | OOM Killer</text>

  <!-- ============ Page Cache ============ -->
  <rect x="20" y="370" width="400" height="130" rx="10" fill="#2c3e50" stroke="#8e44ad" stroke-width="2"/>
  <text x="220" y="394" text-anchor="middle" font-size="13" font-weight="bold" fill="#8e44ad">Page Cache（页面缓存）</text>

  <rect x="35" y="404" width="175" height="36" rx="5" fill="#27ae60" stroke="#1a7a42" stroke-width="1"/>
  <text x="122" y="419" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Clean 页</text>
  <text x="122" y="433" text-anchor="middle" font-size="9" fill="#c8f5d8">与磁盘一致，可释放</text>

  <rect x="225" y="404" width="175" height="36" rx="5" fill="#e74c3c" stroke="#c0392b" stroke-width="1"/>
  <text x="312" y="419" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Dirty 页</text>
  <text x="312" y="433" text-anchor="middle" font-size="9" fill="#ffc8c8">已修改，待回写</text>

  <rect x="35" y="448" width="365" height="36" rx="5" fill="#34495e" stroke="#7f8c8d" stroke-width="1"/>
  <text x="217" y="463" text-anchor="middle" font-size="10" fill="#ecf0f1">LRU：Active ↔ Inactive（文件页 / 匿名页）</text>
  <text x="217" y="478" text-anchor="middle" font-size="9" fill="#95a5a6">内存不足时：文件页直接释放，匿名页写入 Swap</text>

  <!-- ============ 网络子系统 ============ -->
  <rect x="440" y="370" width="420" height="130" rx="10" fill="#2c3e50" stroke="#2980b9" stroke-width="2"/>
  <text x="650" y="394" text-anchor="middle" font-size="13" font-weight="bold" fill="#2980b9">网络内存路径</text>

  <rect x="455" y="404" width="185" height="40" rx="5" fill="#2980b9" stroke="#1a5276" stroke-width="1"/>
  <text x="547" y="421" text-anchor="middle" font-size="10" font-weight="bold" fill="white">sk_buff 发送缓冲区</text>
  <text x="547" y="437" text-anchor="middle" font-size="9" fill="#d0e8ff">Socket 写队列</text>

  <rect x="655" y="404" width="185" height="40" rx="5" fill="#16a085" stroke="#0e6655" stroke-width="1"/>
  <text x="747" y="421" text-anchor="middle" font-size="10" font-weight="bold" fill="white">RX Ring Buffer</text>
  <text x="747" y="437" text-anchor="middle" font-size="9" fill="#c8f5e8">网卡 DMA 接收环</text>

  <rect x="455" y="452" width="385" height="36" rx="5" fill="#1a5276" stroke="#0d3050" stroke-width="1"/>
  <text x="647" y="467" text-anchor="middle" font-size="10" fill="#ecf0f1">sendfile / io_uring 零拷贝</text>
  <text x="647" y="482" text-anchor="middle" font-size="9" fill="#7f8c8d">Page Cache → NIC，绕过用户空间，减少内存拷贝</text>

  <!-- ============ 底层硬件 ============ -->
  <rect x="20" y="520" width="840" height="70" rx="10" fill="#0d1520" stroke="#34495e" stroke-width="2"/>
  <text x="440" y="542" text-anchor="middle" font-size="13" font-weight="bold" fill="#7f8c8d">硬件层</text>

  <rect x="35" y="550" width="195" height="30" rx="5" fill="#1a252f" stroke="#2c3e50" stroke-width="1"/>
  <text x="132" y="569" text-anchor="middle" font-size="11" fill="#ecf0f1">DRAM 主内存  ~100ns</text>

  <rect x="245" y="550" width="195" height="30" rx="5" fill="#1a252f" stroke="#2c3e50" stroke-width="1"/>
  <text x="342" y="569" text-anchor="middle" font-size="11" fill="#ecf0f1">SSD / NVMe  ~0.1ms</text>

  <rect x="455" y="550" width="195" height="30" rx="5" fill="#1a252f" stroke="#2c3e50" stroke-width="1"/>
  <text x="552" y="569" text-anchor="middle" font-size="11" fill="#ecf0f1">HDD 机械磁盘  ~10ms</text>

  <rect x="665" y="550" width="195" height="30" rx="5" fill="#1a252f" stroke="#2c3e50" stroke-width="1"/>
  <text x="762" y="569" text-anchor="middle" font-size="11" fill="#ecf0f1">网卡 NIC  (DMA)</text>

  <!-- ============ 连接箭头 ============ -->

  <!-- CPU L3 → VMM (缺页/TLB miss) -->
  <line x1="170" y1="240" x2="170" y2="283" stroke="#e67e22" stroke-width="2" marker-end="url(#ao)"/>
  <text x="178" y="270" font-size="9" fill="#e67e22">缺页异常</text>

  <!-- 进程虚拟 → VMM -->
  <line x1="450" y1="265" x2="450" y2="283" stroke="#27ae60" stroke-width="2" marker-end="url(#ag)"/>
  <text x="458" y="278" font-size="9" fill="#27ae60">地址映射</text>

  <!-- VMM → Page Cache -->
  <line x1="220" y1="350" x2="220" y2="368" stroke="#8e44ad" stroke-width="2" marker-end="url(#a)"/>
  <text x="228" y="364" font-size="9" fill="#8e44ad">文件访问</text>

  <!-- VMM → 网络 -->
  <line x1="650" y1="350" x2="650" y2="368" stroke="#2980b9" stroke-width="2" marker-end="url(#ab)"/>
  <text x="658" y="364" font-size="9" fill="#2980b9">Socket I/O</text>

  <!-- Page Cache → DRAM -->
  <line x1="132" y1="500" x2="132" y2="518" stroke="#8e44ad" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Page Cache → 磁盘 (回写) -->
  <line x1="300" y1="500" x2="342" y2="518" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ar)"/>
  <text x="310" y="516" font-size="9" fill="#e74c3c">回写</text>

  <!-- 网络 → NIC -->
  <line x1="762" y1="500" x2="762" y2="518" stroke="#2980b9" stroke-width="1.5" marker-end="url(#ab)"/>

  <!-- CPU → DRAM -->
  <line x1="50" y1="265" x2="50" y2="555" stroke="#4a90d9" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ab)"/>
  <text x="15" y="420" font-size="9" fill="#4a90d9" transform="rotate(-90,15,420)">直接访问 DRAM</text>

  <!-- 数字标注延迟 -->
  <rect x="20" y="600" width="860" height="88" rx="8" fill="#0a0f1e" stroke="#2c3e50" stroke-width="1"/>
  <text x="440" y="622" text-anchor="middle" font-size="12" font-weight="bold" fill="#ecf0f1">延迟参考（典型 x86-64）</text>

  <rect x="30" y="632" width="100" height="46" rx="4" fill="#e74c3c"/>
  <text x="80" y="650" text-anchor="middle" font-size="10" font-weight="bold" fill="white">L1 Cache</text>
  <text x="80" y="668" text-anchor="middle" font-size="11" fill="white">~1 ns</text>

  <rect x="140" y="632" width="100" height="46" rx="4" fill="#e67e22"/>
  <text x="190" y="650" text-anchor="middle" font-size="10" font-weight="bold" fill="white">L2 Cache</text>
  <text x="190" y="668" text-anchor="middle" font-size="11" fill="white">~4 ns</text>

  <rect x="250" y="632" width="100" height="46" rx="4" fill="#8e44ad"/>
  <text x="300" y="650" text-anchor="middle" font-size="10" font-weight="bold" fill="white">L3 Cache</text>
  <text x="300" y="668" text-anchor="middle" font-size="11" fill="white">~10 ns</text>

  <rect x="360" y="632" width="100" height="46" rx="4" fill="#2980b9"/>
  <text x="410" y="650" text-anchor="middle" font-size="10" font-weight="bold" fill="white">DRAM</text>
  <text x="410" y="668" text-anchor="middle" font-size="11" fill="white">~100 ns</text>

  <rect x="470" y="632" width="100" height="46" rx="4" fill="#16a085"/>
  <text x="520" y="650" text-anchor="middle" font-size="10" font-weight="bold" fill="white">NVMe SSD</text>
  <text x="520" y="668" text-anchor="middle" font-size="11" fill="white">~0.1 ms</text>

  <rect x="580" y="632" width="100" height="46" rx="4" fill="#27ae60"/>
  <text x="630" y="650" text-anchor="middle" font-size="10" font-weight="bold" fill="white">SATA SSD</text>
  <text x="630" y="668" text-anchor="middle" font-size="11" fill="white">~0.5 ms</text>

  <rect x="690" y="632" width="100" height="46" rx="4" fill="#7f8c8d"/>
  <text x="740" y="650" text-anchor="middle" font-size="10" font-weight="bold" fill="white">HDD</text>
  <text x="740" y="668" text-anchor="middle" font-size="11" fill="white">~10 ms</text>

  <rect x="800" y="632" width="70" height="46" rx="4" fill="#2c3e50" stroke="#4a90d9" stroke-width="1"/>
  <text x="835" y="648" text-anchor="middle" font-size="9" fill="#4a90d9">Swap</text>
  <text x="835" y="664" text-anchor="middle" font-size="9" fill="#7f8c8d">内存×</text>
  <text x="835" y="677" text-anchor="middle" font-size="9" fill="#7f8c8d">磁盘速度</text>
</svg>
