<svg viewBox="0 0 1000 1100" xmlns="http://www.w3.org/2000/svg" font-family="'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2980b9"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#27ae60"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c0392b"/>
    </marker>
  </defs>

  <rect width="1000" height="1100" fill="#f8f9fa" rx="8"/>

  <!-- 标题 -->
  <rect x="0" y="0" width="1000" height="50" fill="#2c3e50" rx="8"/>
  <rect x="0" y="40" width="1000" height="10" fill="#2c3e50"/>
  <text x="500" y="32" text-anchor="middle" fill="white" font-size="20" font-weight="bold">RocketMQ 写入流程演进：4.5 之前 vs 4.5 之后</text>

  <!-- ============ 上半部分：4.5 之前 ============ -->
  <rect x="20" y="70" width="960" height="460" fill="#fff" stroke="#bdc3c7" rx="10" stroke-width="1.5"/>
  <rect x="20" y="70" width="960" height="40" fill="#e74c3c" rx="10"/>
  <rect x="20" y="100" width="960" height="10" fill="#e74c3c"/>
  <text x="500" y="96" text-anchor="middle" fill="white" font-size="16" font-weight="bold">4.5 之前：Master-Slave 主从同步模式（不支持自动切主）</text>

  <!-- Producer -->
  <rect x="60" y="130" width="130" height="60" rx="8" fill="#27ae60" stroke="#1e8449" stroke-width="1.5"/>
  <text x="125" y="156" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Producer</text>
  <text x="125" y="176" text-anchor="middle" fill="white" font-size="10">send(msg)</text>

  <!-- 箭头 Producer -> Master -->
  <line x1="190" y1="160" x2="270" y2="160" stroke="#27ae60" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="230" y="152" text-anchor="middle" font-size="9" fill="#1e8449">Netty</text>

  <!-- Master Broker -->
  <rect x="270" y="125" width="300" height="230" rx="10" fill="#eaf2f8" stroke="#2980b9" stroke-width="2"/>
  <text x="420" y="148" text-anchor="middle" font-size="14" font-weight="bold" fill="#1b4f72">Master Broker (BrokerId=0)</text>

  <!-- CommitLog -->
  <rect x="290" y="160" width="260" height="50" rx="6" fill="#d4efdf" stroke="#27ae60" stroke-width="1.5"/>
  <text x="420" y="180" text-anchor="middle" font-size="12" font-weight="bold" fill="#196f3d">CommitLog 顺序写入</text>
  <text x="420" y="198" text-anchor="middle" font-size="10" fill="#196f3d">MappedByteBuffer.put() → PageCache</text>

  <!-- 刷盘 -->
  <rect x="290" y="220" width="120" height="45" rx="6" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
  <text x="350" y="238" text-anchor="middle" font-size="10" font-weight="bold" fill="#7d6608">同步刷盘</text>
  <text x="350" y="254" text-anchor="middle" font-size="9" fill="#7d6608">fsync → 磁盘</text>

  <rect x="430" y="220" width="120" height="45" rx="6" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
  <text x="490" y="238" text-anchor="middle" font-size="10" font-weight="bold" fill="#7d6608">异步刷盘</text>
  <text x="490" y="254" text-anchor="middle" font-size="9" fill="#7d6608">PageCache 即返回</text>

  <!-- HAService -->
  <rect x="290" y="280" width="260" height="60" rx="6" fill="#fadbd8" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="420" y="300" text-anchor="middle" font-size="12" font-weight="bold" fill="#922b21">HAService（主从复制）</text>
  <text x="420" y="318" text-anchor="middle" font-size="10" fill="#922b21">SYNC_MASTER: 等 Slave 写入 PageCache 后 ACK</text>
  <text x="420" y="334" text-anchor="middle" font-size="10" fill="#922b21">ASYNC_MASTER: 立即返回，Slave 异步拉取</text>

  <!-- Slave Broker -->
  <rect x="650" y="125" width="200" height="230" rx="10" fill="#f4ecf7" stroke="#8e44ad" stroke-width="2"/>
  <text x="750" y="148" text-anchor="middle" font-size="14" font-weight="bold" fill="#6c3483">Slave Broker (BrokerId=1)</text>

  <rect x="670" y="165" width="160" height="40" rx="6" fill="#d7bde2" stroke="#8e44ad" stroke-width="1"/>
  <text x="750" y="182" text-anchor="middle" font-size="10" fill="#4a235a">HAClient 持续拉取 Master 数据</text>
  <text x="750" y="196" text-anchor="middle" font-size="9" fill="#4a235a">写入自己的 CommitLog</text>

  <rect x="670" y="215" width="160" height="35" rx="6" fill="#d7bde2" stroke="#8e44ad" stroke-width="1"/>
  <text x="750" y="232" text-anchor="middle" font-size="10" fill="#4a235a">只读（Consumer 可从 Slave 拉）</text>
  <text x="750" y="245" text-anchor="middle" font-size="9" fill="#4a235a">不能接受写入</text>

  <rect x="670" y="260" width="160" height="80" rx="6" fill="#fdedec" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="750" y="282" text-anchor="middle" font-size="11" font-weight="bold" fill="#c0392b">致命缺陷</text>
  <text x="750" y="300" text-anchor="middle" font-size="10" fill="#c0392b">Master 宕机后：</text>
  <text x="750" y="316" text-anchor="middle" font-size="10" fill="#c0392b">Slave 不能自动升主</text>
  <text x="750" y="332" text-anchor="middle" font-size="10" fill="#c0392b">需人工切换 BrokerId=0</text>

  <!-- 主从连线 -->
  <line x1="570" y1="310" x2="650" y2="280" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>

  <!-- 流程说明 -->
  <rect x="60" y="370" width="510" height="145" rx="6" fill="#fdfefe" stroke="#bdc3c7" stroke-width="1"/>
  <text x="80" y="392" font-size="12" font-weight="bold" fill="#2c3e50">4.5 之前写入流程（时序）：</text>
  <text x="80" y="414" font-size="11" fill="#333">1. Producer → Master: 发送 SEND_MESSAGE 请求</text>
  <text x="80" y="434" font-size="11" fill="#333">2. Master: 追加写入 CommitLog (MappedByteBuffer)</text>
  <text x="80" y="454" font-size="11" fill="#333">3. Master: 刷盘 (SYNC_FLUSH 等 fsync / ASYNC_FLUSH 直接过)</text>
  <text x="80" y="474" font-size="11" fill="#333">4. Master: 主从复制 (SYNC_MASTER 等 Slave ACK / ASYNC 直接过)</text>
  <text x="80" y="494" font-size="11" fill="#333">5. Master → Producer: 返回 SendResult (SEND_OK)</text>
  <text x="80" y="510" font-size="10" fill="#c0392b" font-weight="bold">⚠ Master 故障 → 该 BrokerName 不可写，需人工介入恢复</text>

  <!-- ============ 下半部分：4.5 之后 ============ -->
  <rect x="20" y="550" width="960" height="530" fill="#fff" stroke="#bdc3c7" rx="10" stroke-width="1.5"/>
  <rect x="20" y="550" width="960" height="40" fill="#27ae60" rx="10"/>
  <rect x="20" y="580" width="960" height="10" fill="#27ae60"/>
  <text x="500" y="576" text-anchor="middle" fill="white" font-size="16" font-weight="bold">4.5 之后：DLedger 模式（基于 Raft，自动选主）</text>

  <!-- Producer -->
  <rect x="60" y="610" width="130" height="60" rx="8" fill="#27ae60" stroke="#1e8449" stroke-width="1.5"/>
  <text x="125" y="636" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Producer</text>
  <text x="125" y="656" text-anchor="middle" fill="white" font-size="10">send(msg)</text>

  <!-- 箭头 Producer -> Leader -->
  <line x1="190" y1="640" x2="270" y2="640" stroke="#27ae60" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="230" y="632" text-anchor="middle" font-size="9" fill="#1e8449">Netty</text>

  <!-- DLedger Group -->
  <rect x="270" y="600" width="690" height="310" rx="10" fill="#eafaf1" stroke="#27ae60" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="615" y="625" text-anchor="middle" font-size="14" font-weight="bold" fill="#196f3d">DLedger BrokerGroup（3 节点 Raft 集群）</text>

  <!-- Leader -->
  <rect x="290" y="640" width="220" height="190" rx="8" fill="#d4efdf" stroke="#27ae60" stroke-width="2"/>
  <text x="400" y="662" text-anchor="middle" font-size="13" font-weight="bold" fill="#196f3d">Leader (自动选出)</text>

  <rect x="305" y="675" width="190" height="40" rx="5" fill="#a9dfbf" stroke="#27ae60" stroke-width="1"/>
  <text x="400" y="693" text-anchor="middle" font-size="10" fill="#145a32">1. CommitLog 顺序写入</text>
  <text x="400" y="707" text-anchor="middle" font-size="9" fill="#145a32">DLedgerCommitLog.putMessage()</text>

  <rect x="305" y="725" width="190" height="40" rx="5" fill="#a9dfbf" stroke="#27ae60" stroke-width="1"/>
  <text x="400" y="743" text-anchor="middle" font-size="10" fill="#145a32">2. 封装为 DLedger Entry</text>
  <text x="400" y="757" text-anchor="middle" font-size="9" fill="#145a32">追加到 Raft Log</text>

  <rect x="305" y="775" width="190" height="45" rx="5" fill="#a9dfbf" stroke="#27ae60" stroke-width="1"/>
  <text x="400" y="793" text-anchor="middle" font-size="10" fill="#145a32">3. 等待多数派 ACK</text>
  <text x="400" y="808" text-anchor="middle" font-size="9" fill="#145a32">2/3 节点确认 → Committed</text>

  <!-- Follower 1 -->
  <rect x="550" y="640" width="180" height="130" rx="8" fill="#d5f5e3" stroke="#27ae60" stroke-width="1.5"/>
  <text x="640" y="662" text-anchor="middle" font-size="12" font-weight="bold" fill="#196f3d">Follower-1</text>
  <text x="640" y="684" text-anchor="middle" font-size="10" fill="#196f3d">接收 Leader AppendEntries</text>
  <text x="640" y="704" text-anchor="middle" font-size="10" fill="#196f3d">写入本地 Raft Log</text>
  <text x="640" y="724" text-anchor="middle" font-size="10" fill="#196f3d">返回 ACK</text>
  <text x="640" y="752" text-anchor="middle" font-size="9" fill="#27ae60" font-weight="bold">可被选为新 Leader</text>

  <!-- Follower 2 -->
  <rect x="770" y="640" width="180" height="130" rx="8" fill="#d5f5e3" stroke="#27ae60" stroke-width="1.5"/>
  <text x="860" y="662" text-anchor="middle" font-size="12" font-weight="bold" fill="#196f3d">Follower-2</text>
  <text x="860" y="684" text-anchor="middle" font-size="10" fill="#196f3d">接收 Leader AppendEntries</text>
  <text x="860" y="704" text-anchor="middle" font-size="10" fill="#196f3d">写入本地 Raft Log</text>
  <text x="860" y="724" text-anchor="middle" font-size="10" fill="#196f3d">返回 ACK</text>
  <text x="860" y="752" text-anchor="middle" font-size="9" fill="#27ae60" font-weight="bold">可被选为新 Leader</text>

  <!-- Leader -> Follower 箭头 -->
  <line x1="510" y1="700" x2="550" y2="700" stroke="#27ae60" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="510" y1="720" x2="770" y2="710" stroke="#27ae60" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- 自动切主说明 -->
  <rect x="550" y="790" width="400" height="105" rx="6" fill="#d1f2eb" stroke="#1abc9c" stroke-width="1.5"/>
  <text x="750" y="812" text-anchor="middle" font-size="12" font-weight="bold" fill="#0e6655">自动故障切换（核心改进）</text>
  <text x="570" y="834" font-size="11" fill="#0e6655">• Leader 宕机 → Follower 发起 RequestVote</text>
  <text x="570" y="854" font-size="11" fill="#0e6655">• 获得多数票 → 成为新 Leader（10s 内完成）</text>
  <text x="570" y="874" font-size="11" fill="#0e6655">• Producer 自动感知路由变化，切换到新 Leader</text>
  <text x="570" y="894" font-size="11" fill="#0e6655">• 无需人工干预，写入能力自动恢复</text>

  <!-- 流程说明 -->
  <rect x="60" y="920" width="510" height="145" rx="6" fill="#fdfefe" stroke="#bdc3c7" stroke-width="1"/>
  <text x="80" y="942" font-size="12" font-weight="bold" fill="#2c3e50">4.5 之后写入流程（时序）：</text>
  <text x="80" y="964" font-size="11" fill="#333">1. Producer → Leader Broker: 发送 SEND_MESSAGE 请求</text>
  <text x="80" y="984" font-size="11" fill="#333">2. Leader: 追加到 DLedger CommitLog（封装 Raft Entry）</text>
  <text x="80" y="1004" font-size="11" fill="#333">3. Leader → Follower: 发送 AppendEntries RPC（并行）</text>
  <text x="80" y="1024" font-size="11" fill="#333">4. Follower: 写入本地 Raft Log → 返回 ACK</text>
  <text x="80" y="1044" font-size="11" fill="#333">5. Leader: 收到多数派 ACK → 标记 Committed</text>
  <text x="80" y="1064" font-size="11" fill="#27ae60" font-weight="bold">6. Leader → Producer: 返回 SendResult (SEND_OK)</text>

  <!-- 对比标注 -->
  <rect x="610" y="920" width="350" height="145" rx="6" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
  <text x="785" y="942" text-anchor="middle" font-size="12" font-weight="bold" fill="#7d6608">核心区别对比</text>
  <text x="630" y="964" font-size="11" fill="#7d6608">• 复制单位：消息 → Raft Entry（日志条目）</text>
  <text x="630" y="984" font-size="11" fill="#7d6608">• ACK 条件：单 Slave → 多数派（N/2+1）</text>
  <text x="630" y="1004" font-size="11" fill="#7d6608">• 故障切换：手动 → 自动选主（10s）</text>
  <text x="630" y="1024" font-size="11" fill="#7d6608">• 节点数：2（1主1从）→ 3+（奇数）</text>
  <text x="630" y="1044" font-size="11" fill="#7d6608">• 一致性：最终一致 → 强一致（Raft）</text>
  <text x="630" y="1064" font-size="11" fill="#c0392b">• 代价：吞吐略降（多一跳投票开销）</text>
</svg>
