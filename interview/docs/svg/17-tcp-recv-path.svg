<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 860" font-family="'Courier New', monospace">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#555"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#27ae60"/>
    </marker>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#c0392b"/>
    </marker>
  </defs>
  <rect width="1000" height="860" fill="#f8f9fa"/>

  <text x="500" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">TCP 接收路径全流程（网卡收到数据 → Java read() 返回）</text>

  <!-- ============ STEP 1: NIC RX ============ -->
  <rect x="20" y="46" width="960" height="100" rx="8" fill="#fef5e7" stroke="#e67e22" stroke-width="2"/>
  <text x="30" y="64" font-size="12" font-weight="bold" fill="#b7770d">STEP 1  NIC 接收帧 + DMA 写入 RX Ring Buffer</text>

  <rect x="30" y="72" width="470" height="66" rx="4" fill="#fff" stroke="#e67e22" stroke-width="1"/>
  <text x="265" y="88" text-anchor="middle" font-size="11" font-weight="bold" fill="#b7770d">RX Ring Buffer（NIC ↔ 驱动 共享的循环队列）</text>
  <g font-size="9">
    <rect x="40" y="96" width="66" height="36" rx="2" fill="#27ae60"/>
    <text x="73" y="110" text-anchor="middle" fill="white">desc[0]</text>
    <text x="73" y="122" text-anchor="middle" fill="white">skb已处理</text>

    <rect x="112" y="96" width="66" height="36" rx="2" fill="#e67e22"/>
    <text x="145" y="110" text-anchor="middle" fill="white">desc[1]</text>
    <text x="145" y="122" text-anchor="middle" fill="white">DMA写入中</text>

    <rect x="184" y="96" width="66" height="36" rx="2" fill="#e74c3c"/>
    <text x="217" y="110" text-anchor="middle" fill="white">desc[2]</text>
    <text x="217" y="122" text-anchor="middle" fill="white">待处理</text>

    <rect x="256" y="96" width="66" height="36" rx="2" fill="#95a5a6"/>
    <text x="289" y="110" text-anchor="middle" fill="white">desc[3]</text>
    <text x="289" y="122" text-anchor="middle" fill="white">空闲</text>

    <rect x="328" y="96" width="66" height="36" rx="2" fill="#95a5a6"/>
    <text x="361" y="110" text-anchor="middle" fill="white">desc[4]</text>
    <text x="361" y="122" text-anchor="middle" fill="white">空闲</text>

    <text x="415" y="118" fill="#95a5a6" font-size="14">…</text>
    <text x="440" y="118" fill="#95a5a6">（环形）</text>
  </g>

  <rect x="510" y="72" width="462" height="66" rx="4" fill="#fff" stroke="#e67e22" stroke-width="1"/>
  <text x="741" y="88" text-anchor="middle" font-size="11" font-weight="bold" fill="#b7770d">驱动预分配 sk_buff + DMA 映射</text>
  <g font-size="10" fill="#1a252f">
    <text x="520" y="104">① 驱动启动时：为每个 RX desc 预分配 sk_buff 并 dma_map_single()</text>
    <text x="520" y="118">② NIC 收到帧：DMA 引擎直接将以太网帧写入该 sk_buff 的数据区</text>
    <text x="520" y="132" fill="#27ae60">③ DMA 写完：NIC 更新 RDH（Head Desc），触发硬中断（IRQ）</text>
  </g>

  <line x1="500" y1="146" x2="500" y2="162" stroke="#27ae60" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="510" y="157" font-size="10" fill="#e74c3c">硬中断 IRQ</text>

  <!-- ============ STEP 2: NAPI ============ -->
  <rect x="20" y="164" width="960" height="100" rx="8" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="30" y="182" font-size="12" font-weight="bold" fill="#1d8348">STEP 2  硬中断 → 软中断 → NAPI poll()  —— 批量收包</text>

  <rect x="30" y="190" width="300" height="66" rx="4" fill="#fff" stroke="#27ae60" stroke-width="1"/>
  <text x="38" y="206" font-size="11" font-weight="bold" fill="#1d8348">硬中断（NIC IRQ handler）</text>
  <text x="38" y="222" font-size="10" fill="#1a252f">① 禁用该网卡的 RX 中断（防中断风暴）</text>
  <text x="38" y="236" font-size="10" fill="#1a252f">② 将该网卡加入 poll_list（软中断待处理）</text>
  <text x="38" y="250" font-size="10" fill="#1a252f">③ 触发 NET_RX_SOFTIRQ 软中断</text>

  <rect x="340" y="190" width="300" height="66" rx="4" fill="#fff" stroke="#27ae60" stroke-width="1"/>
  <text x="348" y="206" font-size="11" font-weight="bold" fill="#1d8348">NET_RX_SOFTIRQ（ksoftirqd）</text>
  <text x="348" y="222" font-size="10" fill="#1a252f">net_rx_action() 遍历 poll_list</text>
  <text x="348" y="236" font-size="10" fill="#1a252f">调用驱动 napi_poll()（每次最多处理</text>
  <text x="348" y="250" font-size="10" fill="#1a252f">net.core.netdev_budget=300 个包）</text>

  <rect x="650" y="190" width="322" height="66" rx="4" fill="#fff" stroke="#27ae60" stroke-width="1"/>
  <text x="658" y="206" font-size="11" font-weight="bold" fill="#1d8348">驱动 poll() 批量处理</text>
  <text x="658" y="222" font-size="10" fill="#1a252f">从 RX Ring 取 sk_buff，dma_unmap()</text>
  <text x="658" y="236" font-size="10" fill="#1a252f">为 desc 补充新 sk_buff（重新 dma_map）</text>
  <text x="658" y="250" font-size="10" fill="#27ae60">netif_receive_skb() 送入协议栈</text>

  <line x1="500" y1="264" x2="500" y2="280" stroke="#27ae60" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- ============ STEP 3: netif_receive_skb ============ -->
  <rect x="20" y="282" width="960" height="80" rx="8" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="30" y="300" font-size="12" font-weight="bold" fill="#1d8348">STEP 3  netif_receive_skb()  —— 协议分发</text>

  <rect x="30" y="308" width="260" height="46" rx="4" fill="#fff" stroke="#27ae60" stroke-width="1"/>
  <text x="38" y="324" font-size="11" fill="#1a252f">GRO (Generic Receive Offload)</text>
  <text x="38" y="338" font-size="10" fill="#27ae60">合并小包（TCP ACK合并，减少软中断处理次数）</text>
  <text x="38" y="352" font-size="10" fill="#7f8c8d">类似发送端 TSO 的接收侧优化</text>

  <rect x="300" y="308" width="260" height="46" rx="4" fill="#fff" stroke="#27ae60" stroke-width="1"/>
  <text x="308" y="324" font-size="11" fill="#1a252f">XDP（eXpress Data Path）钩子</text>
  <text x="308" y="338" font-size="10" fill="#1a252f">eBPF 程序在驱动层最早处理包</text>
  <text x="308" y="352" font-size="10" fill="#e67e22">XDP_DROP / XDP_PASS / XDP_TX</text>

  <rect x="570" y="308" width="260" height="46" rx="4" fill="#fff" stroke="#27ae60" stroke-width="1"/>
  <text x="578" y="324" font-size="11" fill="#1a252f">protocol dispatch</text>
  <text x="578" y="338" font-size="10" fill="#1a252f">EtherType=0x0800 → ip_rcv()</text>
  <text x="578" y="352" font-size="10" fill="#7f8c8d">Netfilter PREROUTING 钩子</text>

  <rect x="840" y="308" width="132" height="46" rx="4" fill="#fff" stroke="#27ae60" stroke-width="1"/>
  <text x="848" y="324" font-size="11" fill="#1a252f">tc ingress</text>
  <text x="848" y="338" font-size="10" fill="#1a252f">流量分类/限速</text>
  <text x="848" y="352" font-size="10" fill="#7f8c8d">eBPF/cls_bpf</text>

  <line x1="500" y1="362" x2="500" y2="378" stroke="#27ae60" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- ============ STEP 4: IP ============ -->
  <rect x="20" y="380" width="960" height="80" rx="8" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="30" y="398" font-size="12" font-weight="bold" fill="#1d8348">STEP 4  IP 层  ip_rcv() / ip_local_deliver()</text>

  <rect x="30" y="406" width="280" height="46" rx="4" fill="#fff" stroke="#27ae60" stroke-width="1"/>
  <text x="38" y="422" font-size="11" fill="#1a252f">校验 IP 头 checksum</text>
  <text x="38" y="436" font-size="10" fill="#1a252f">TTL -1，目标 IP 本机 → ip_local_deliver()</text>
  <text x="38" y="450" font-size="10" fill="#7f8c8d">不是本机 → ip_forward()（路由器功能）</text>

  <rect x="320" y="406" width="280" height="46" rx="4" fill="#fff" stroke="#27ae60" stroke-width="1"/>
  <text x="328" y="422" font-size="11" fill="#1a252f">IP 分片重组</text>
  <text x="328" y="436" font-size="10" fill="#1a252f">若收到分片（MF=1 或 offset≠0）</text>
  <text x="328" y="450" font-size="10" fill="#e67e22">缓存分片，全部到齐后重组为完整包</text>

  <rect x="610" y="406" width="362" height="46" rx="4" fill="#fff" stroke="#27ae60" stroke-width="1"/>
  <text x="618" y="422" font-size="11" fill="#1a252f">protocol = 6（TCP）→ tcp_v4_rcv()</text>
  <text x="618" y="436" font-size="10" fill="#1a252f">Netfilter INPUT 钩子（iptables INPUT 链）</text>
  <text x="618" y="450" font-size="10" fill="#7f8c8d">conntrack 连接跟踪更新</text>

  <line x1="500" y1="460" x2="500" y2="476" stroke="#27ae60" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- ============ STEP 5: TCP ============ -->
  <rect x="20" y="478" width="960" height="130" rx="8" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="30" y="496" font-size="12" font-weight="bold" fill="#1d8348">STEP 5  TCP 层  tcp_v4_rcv() / tcp_rcv_established()</text>

  <rect x="30" y="504" width="220" height="96" rx="4" fill="#fff" stroke="#27ae60" stroke-width="1"/>
  <text x="40" y="520" font-size="11" font-weight="bold" fill="#1d8348">序列号校验</text>
  <text x="40" y="536" font-size="10" fill="#1a252f">seq 在窗口内？</text>
  <text x="40" y="550" font-size="10" fill="#27ae60">  是 → 正常处理</text>
  <text x="40" y="564" font-size="10" fill="#e74c3c">  否 → 发 ACK，丢弃</text>
  <text x="40" y="578" font-size="10" fill="#1a252f">重复包检测（seq ≤ rcv_nxt）</text>
  <text x="40" y="592" font-size="10" fill="#7f8c8d">→ 直接丢弃，不送上层</text>

  <rect x="260" y="504" width="220" height="96" rx="4" fill="#fff" stroke="#27ae60" stroke-width="1"/>
  <text x="270" y="520" font-size="11" font-weight="bold" fill="#1d8348">乱序处理</text>
  <text x="270" y="536" font-size="10" fill="#1a252f">seq &gt; rcv_nxt（有空洞）</text>
  <text x="270" y="550" font-size="10" fill="#e67e22">→ 加入 out_of_order_queue</text>
  <text x="270" y="564" font-size="10" fill="#1a252f">立即回 SACK（选择确认）</text>
  <text x="270" y="578" font-size="10" fill="#1a252f">空洞填补后合并到</text>
  <text x="270" y="592" font-size="10" fill="#27ae60">  sk_receive_queue</text>

  <rect x="490" y="504" width="220" height="96" rx="4" fill="#fff" stroke="#27ae60" stroke-width="1"/>
  <text x="500" y="520" font-size="11" font-weight="bold" fill="#1d8348">放入接收缓冲区</text>
  <text x="500" y="536" font-size="10" fill="#1a252f">skb_queue_tail(&amp;sk→</text>
  <text x="500" y="550" font-size="10" fill="#1a252f">  sk_receive_queue, skb)</text>
  <text x="500" y="564" font-size="10" fill="#1a252f">sk_rmem_alloc 增加</text>
  <text x="500" y="578" font-size="10" fill="#e74c3c">超过 sk_rcvbuf →</text>
  <text x="500" y="592" font-size="10" fill="#e74c3c">  丢包（对端触发重传）</text>

  <rect x="720" y="504" width="252" height="96" rx="4" fill="#fff" stroke="#27ae60" stroke-width="1"/>
  <text x="730" y="520" font-size="11" font-weight="bold" fill="#1d8348">发送 ACK + 窗口更新</text>
  <text x="730" y="536" font-size="10" fill="#1a252f">tcp_send_ack()</text>
  <text x="730" y="550" font-size="10" fill="#1a252f">ACK = rcv_nxt（期望下一个seq）</text>
  <text x="730" y="564" font-size="10" fill="#1a252f">window = sk_rcvbuf - sk_rmem_alloc</text>
  <text x="730" y="578" font-size="10" fill="#27ae60">唤醒等待的应用进程</text>
  <text x="730" y="592" font-size="10" fill="#27ae60">sk_data_ready() → epoll 事件</text>

  <line x1="500" y1="608" x2="500" y2="624" stroke="#27ae60" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- ============ STEP 6: epoll / blocking read ============ -->
  <rect x="20" y="626" width="960" height="90" rx="8" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="30" y="644" font-size="12" font-weight="bold" fill="#1d8348">STEP 6  应用获得通知  —— 阻塞 read 唤醒 / epoll 事件</text>

  <rect x="30" y="652" width="440" height="56" rx="4" fill="#fff" stroke="#27ae60" stroke-width="1"/>
  <text x="38" y="668" font-size="11" font-weight="bold" fill="#1d8348">阻塞式（BIO）</text>
  <text x="38" y="684" font-size="10" fill="#1a252f">线程阻塞在 recv()，加入 sk→sk_sleep 等待队列</text>
  <text x="38" y="698" font-size="10" fill="#27ae60">tcp_rcv_established() 调用 sk_data_ready() → wake_up(sk_sleep)</text>

  <rect x="480" y="652" width="492" height="56" rx="4" fill="#fff" stroke="#27ae60" stroke-width="1"/>
  <text x="488" y="668" font-size="11" font-weight="bold" fill="#1d8348">NIO + epoll（Java Selector）</text>
  <text x="488" y="684" font-size="10" fill="#1a252f">sk_data_ready() → ep_poll_callback() → 唤醒 epoll_wait()</text>
  <text x="488" y="698" font-size="10" fill="#27ae60">Selector.select() 返回，应用调用 channel.read() 读数据</text>

  <line x1="500" y1="716" x2="500" y2="732" stroke="#27ae60" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- ============ STEP 7: tcp_recvmsg ============ -->
  <rect x="20" y="734" width="960" height="116" rx="8" fill="#d5f5e3" stroke="#27ae60" stroke-width="2"/>
  <text x="30" y="752" font-size="12" font-weight="bold" fill="#1d8348">STEP 7  tcp_recvmsg()  —— 数据交给 Java 应用</text>

  <rect x="30" y="760" width="370" height="82" rx="4" fill="#fff" stroke="#27ae60" stroke-width="1"/>
  <text x="38" y="776" font-size="11" font-weight="bold" fill="#1d8348">从 sk_receive_queue 取数据</text>
  <text x="38" y="792" font-size="10" fill="#1a252f">skb_dequeue(&amp;sk→sk_receive_queue)</text>
  <text x="38" y="806" font-size="10" fill="#1a252f">copy_to_user(user_buf, skb→data, len)</text>
  <text x="38" y="820" font-size="10" fill="#e67e22">  → 一次 CPU 复制（这是 recv() 的那次复制）</text>
  <text x="38" y="834" font-size="10" fill="#1a252f">skb 消费完 → kfree_skb()，sk_rmem_alloc 减小</text>

  <rect x="410" y="760" width="300" height="82" rx="4" fill="#fff" stroke="#27ae60" stroke-width="1"/>
  <text x="418" y="776" font-size="11" font-weight="bold" fill="#1d8348">接收窗口自动扩大</text>
  <text x="418" y="792" font-size="10" fill="#1a252f">tcp_rcv_space_adjust()</text>
  <text x="418" y="806" font-size="10" fill="#1a252f">应用读取数据后 sk_rmem_alloc 减小</text>
  <text x="418" y="820" font-size="10" fill="#27ae60">→ window 增大 → 发 ACK 通知对端</text>
  <text x="418" y="834" font-size="10" fill="#27ae60">→ 对端可发更多数据（零窗口恢复）</text>

  <rect x="720" y="760" width="252" height="82" rx="4" fill="#fff" stroke="#27ae60" stroke-width="1"/>
  <text x="728" y="776" font-size="11" font-weight="bold" fill="#1d8348">Java 端获得数据</text>
  <text x="728" y="792" font-size="10" fill="#1a252f">channel.read(byteBuffer) 返回</text>
  <text x="728" y="806" font-size="10" fill="#1a252f">byteBuffer 中存有网络数据</text>
  <text x="728" y="820" font-size="10" fill="#27ae60">完整链路：NIC → sk_buff →</text>
  <text x="728" y="834" font-size="10" fill="#27ae60">copy_to_user → ByteBuffer ✓</text>
</svg>
