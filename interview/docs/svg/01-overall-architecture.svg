<svg xmlns="http://www.w3.org/2000/svg" width="900" height="580" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrow-white" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fff"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="580" fill="#f8f9fa" rx="12"/>
  <text x="450" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">Linux 内存管理整体架构</text>

  <!-- 用户空间区域 -->
  <rect x="30" y="60" width="840" height="130" rx="10" fill="#e8f4f8" stroke="#4a90d9" stroke-width="2"/>
  <text x="50" y="82" font-size="14" font-weight="bold" fill="#2c5f8a">用户空间 (User Space)</text>

  <!-- 进程A -->
  <rect x="55" y="92" width="140" height="80" rx="8" fill="#4a90d9" stroke="#2c5f8a" stroke-width="1.5"/>
  <text x="125" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="white">进程 A</text>
  <text x="125" y="140" text-anchor="middle" font-size="11" fill="#d0e8ff">虚拟地址空间</text>
  <text x="125" y="158" text-anchor="middle" font-size="10" fill="#b0d4f8">0x0 ~ 0x7FFF…</text>

  <!-- 进程B -->
  <rect x="215" y="92" width="140" height="80" rx="8" fill="#4a90d9" stroke="#2c5f8a" stroke-width="1.5"/>
  <text x="285" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="white">进程 B</text>
  <text x="285" y="140" text-anchor="middle" font-size="11" fill="#d0e8ff">虚拟地址空间</text>
  <text x="285" y="158" text-anchor="middle" font-size="10" fill="#b0d4f8">0x0 ~ 0x7FFF…</text>

  <!-- 进程C -->
  <rect x="375" y="92" width="140" height="80" rx="8" fill="#4a90d9" stroke="#2c5f8a" stroke-width="1.5"/>
  <text x="445" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="white">进程 C</text>
  <text x="445" y="140" text-anchor="middle" font-size="11" fill="#d0e8ff">虚拟地址空间</text>
  <text x="445" y="158" text-anchor="middle" font-size="10" fill="#b0d4f8">0x0 ~ 0x7FFF…</text>

  <!-- 更多进程 -->
  <rect x="535" y="92" width="310" height="80" rx="8" fill="#7ab3d9" stroke="#2c5f8a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="690" y="136" text-anchor="middle" font-size="14" fill="white">... 更多进程</text>

  <!-- syscall 分隔线 -->
  <line x1="30" y1="215" x2="870" y2="215" stroke="#e74c3c" stroke-width="3" stroke-dasharray="10,4"/>
  <rect x="340" y="203" width="220" height="24" rx="12" fill="#e74c3c"/>
  <text x="450" y="219" text-anchor="middle" font-size="12" font-weight="bold" fill="white">系统调用边界 (syscall)</text>

  <!-- 内核空间区域 -->
  <rect x="30" y="230" width="840" height="200" rx="10" fill="#fef5e7" stroke="#e67e22" stroke-width="2"/>
  <text x="50" y="252" font-size="14" font-weight="bold" fill="#8b4513">内核空间 (Kernel Space)</text>

  <!-- VMM -->
  <rect x="55" y="260" width="760" height="55" rx="8" fill="#e67e22" stroke="#b7510a" stroke-width="1.5"/>
  <text x="435" y="284" text-anchor="middle" font-size="13" font-weight="bold" fill="white">虚拟内存管理子系统 (VMM)</text>
  <text x="435" y="304" text-anchor="middle" font-size="11" fill="#ffe8cc">MMU / 页表 / TLB / 缺页异常处理 / VMA 管理</text>

  <!-- 三个子模块 -->
  <rect x="55" y="330" width="230" height="80" rx="8" fill="#27ae60" stroke="#1a7a42" stroke-width="1.5"/>
  <text x="170" y="358" text-anchor="middle" font-size="13" font-weight="bold" fill="white">物理内存管理</text>
  <text x="170" y="378" text-anchor="middle" font-size="11" fill="#c8f5d8">Buddy System</text>
  <text x="170" y="396" text-anchor="middle" font-size="10" fill="#a8e8be">页帧分配 / 释放</text>

  <rect x="310" y="330" width="230" height="80" rx="8" fill="#8e44ad" stroke="#5d2d7a" stroke-width="1.5"/>
  <text x="425" y="358" text-anchor="middle" font-size="13" font-weight="bold" fill="white">页面缓存</text>
  <text x="425" y="378" text-anchor="middle" font-size="11" fill="#e8c8ff">Page Cache</text>
  <text x="425" y="396" text-anchor="middle" font-size="10" fill="#d4aaff">文件 I/O 统一缓冲</text>

  <rect x="565" y="330" width="250" height="80" rx="8" fill="#c0392b" stroke="#8b1a1a" stroke-width="1.5"/>
  <text x="690" y="358" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Slab 分配器</text>
  <text x="690" y="378" text-anchor="middle" font-size="11" fill="#ffc8c8">内核对象缓存</text>
  <text x="690" y="396" text-anchor="middle" font-size="10" fill="#ffaaaa">kmalloc / kmem_cache</text>

  <!-- 底层硬件 -->
  <rect x="30" y="455" width="840" height="100" rx="10" fill="#2c3e50" stroke="#1a252f" stroke-width="2"/>
  <text x="50" y="476" font-size="14" font-weight="bold" fill="#ecf0f1">硬件层</text>

  <rect x="55" y="486" width="220" height="55" rx="8" fill="#34495e" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="165" y="510" text-anchor="middle" font-size="13" font-weight="bold" fill="#ecf0f1">物理 DRAM</text>
  <text x="165" y="530" text-anchor="middle" font-size="11" fill="#95a5a6">内存条 / 主内存</text>

  <rect x="295" y="486" width="220" height="55" rx="8" fill="#34495e" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="405" y="510" text-anchor="middle" font-size="13" font-weight="bold" fill="#ecf0f1">块设备</text>
  <text x="405" y="530" text-anchor="middle" font-size="11" fill="#95a5a6">磁盘 / SSD / NVMe</text>

  <rect x="535" y="486" width="280" height="55" rx="8" fill="#34495e" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="675" y="510" text-anchor="middle" font-size="13" font-weight="bold" fill="#ecf0f1">CPU Cache</text>
  <text x="675" y="530" text-anchor="middle" font-size="11" fill="#95a5a6">L1 / L2 / L3 缓存</text>

  <!-- 连接箭头：进程到内核 -->
  <line x1="125" y1="172" x2="125" y2="208" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="285" y1="172" x2="285" y2="208" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="445" y1="172" x2="445" y2="208" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- VMM到子模块箭头 -->
  <line x1="170" y1="315" x2="170" y2="328" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="425" y1="315" x2="425" y2="328" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="690" y1="315" x2="690" y2="328" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 子模块到硬件箭头 -->
  <line x1="165" y1="410" x2="165" y2="484" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="425" y1="410" x2="405" y2="484" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="690" y1="410" x2="675" y2="484" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
