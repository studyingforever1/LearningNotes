<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a90d9"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#27ae60"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="620" fill="#f8f9fa" rx="8"/>

  <!-- 标题 -->
  <rect x="0" y="0" width="900" height="50" fill="#2c3e50" rx="8"/>
  <rect x="0" y="40" width="900" height="10" fill="#2c3e50"/>
  <text x="450" y="32" text-anchor="middle" fill="white" font-size="20" font-weight="bold">Elasticsearch 搜索推荐（Suggest）整体架构</text>

  <!-- 用户输入区域 -->
  <rect x="30" y="75" width="200" height="80" rx="10" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="130" y="105" text-anchor="middle" fill="white" font-size="14" font-weight="bold">用户输入</text>
  <text x="130" y="125" text-anchor="middle" fill="white" font-size="12">搜索词 / 前缀词</text>
  <text x="130" y="143" text-anchor="middle" fill="white" font-size="11" opacity="0.9">例如: "elstc" / "java"</text>

  <!-- 请求到ES -->
  <line x1="230" y1="115" x2="300" y2="115" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="265" y="108" text-anchor="middle" fill="#555" font-size="10">HTTP请求</text>

  <!-- ES核心 -->
  <rect x="300" y="60" width="340" height="490" rx="12" fill="white" stroke="#bdc3c7" stroke-width="2"/>
  <rect x="300" y="60" width="340" height="40" rx="12" fill="#2c3e50"/>
  <rect x="300" y="88" width="340" height="12" fill="#2c3e50"/>
  <text x="470" y="86" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Elasticsearch Core</text>

  <!-- Suggest API -->
  <rect x="320" y="115" width="300" height="55" rx="8" fill="#e8f4fd" stroke="#3498db" stroke-width="1.5"/>
  <text x="470" y="136" text-anchor="middle" fill="#2980b9" font-size="13" font-weight="bold">Suggest API</text>
  <text x="470" y="155" text-anchor="middle" fill="#555" font-size="11">/_search  /  /_suggest</text>

  <!-- 4种推荐类型 -->
  <!-- Term Suggester -->
  <rect x="320" y="185" width="130" height="85" rx="8" fill="#ffeaa7" stroke="#f39c12" stroke-width="1.5"/>
  <text x="385" y="205" text-anchor="middle" fill="#e67e22" font-size="12" font-weight="bold">Term Suggester</text>
  <text x="385" y="220" text-anchor="middle" fill="#555" font-size="10">词项推荐</text>
  <text x="385" y="235" text-anchor="middle" fill="#777" font-size="9">基于编辑距离</text>
  <text x="385" y="248" text-anchor="middle" fill="#777" font-size="9">拼写纠错</text>
  <text x="385" y="262" text-anchor="middle" fill="#777" font-size="9">"elstc"→"elastic"</text>

  <!-- Phrase Suggester -->
  <rect x="470" y="185" width="130" height="85" rx="8" fill="#d5f5e3" stroke="#27ae60" stroke-width="1.5"/>
  <text x="535" y="205" text-anchor="middle" fill="#27ae60" font-size="12" font-weight="bold">Phrase Suggester</text>
  <text x="535" y="220" text-anchor="middle" fill="#555" font-size="10">短语推荐</text>
  <text x="535" y="235" text-anchor="middle" fill="#777" font-size="9">基于n-gram模型</text>
  <text x="535" y="248" text-anchor="middle" fill="#777" font-size="9">整句纠错</text>
  <text x="535" y="262" text-anchor="middle" fill="#777" font-size="9">"java progamming"</text>

  <!-- Completion Suggester -->
  <rect x="320" y="285" width="130" height="85" rx="8" fill="#fadbd8" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="385" y="305" text-anchor="middle" fill="#e74c3c" font-size="12" font-weight="bold">Completion</text>
  <text x="385" y="320" text-anchor="middle" fill="#e74c3c" font-size="12" font-weight="bold">Suggester</text>
  <text x="385" y="335" text-anchor="middle" fill="#777" font-size="9">FST前缀树</text>
  <text x="385" y="348" text-anchor="middle" fill="#777" font-size="9">实时自动补全</text>
  <text x="385" y="362" text-anchor="middle" fill="#777" font-size="9">"java"→"java spring"</text>

  <!-- Context Suggester -->
  <rect x="470" y="285" width="130" height="85" rx="8" fill="#e8daef" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="535" y="305" text-anchor="middle" fill="#9b59b6" font-size="12" font-weight="bold">Context</text>
  <text x="535" y="320" text-anchor="middle" fill="#9b59b6" font-size="12" font-weight="bold">Suggester</text>
  <text x="535" y="335" text-anchor="middle" fill="#777" font-size="9">上下文过滤</text>
  <text x="535" y="348" text-anchor="middle" fill="#777" font-size="9">分类/地理位置</text>
  <text x="535" y="362" text-anchor="middle" fill="#777" font-size="9">场景定制推荐</text>

  <!-- 底层存储 -->
  <rect x="320" y="385" width="280" height="145" rx="8" fill="#f0f3f4" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="460" y="405" text-anchor="middle" fill="#2c3e50" font-size="12" font-weight="bold">底层数据结构</text>

  <!-- Inverted Index -->
  <rect x="335" y="415" width="115" height="50" rx="6" fill="#d6eaf8" stroke="#3498db" stroke-width="1"/>
  <text x="392" y="432" text-anchor="middle" fill="#2980b9" font-size="11" font-weight="bold">倒排索引</text>
  <text x="392" y="447" text-anchor="middle" fill="#555" font-size="10">Term/Phrase用</text>
  <text x="392" y="460" text-anchor="middle" fill="#777" font-size="9">Levenshtein距离</text>

  <!-- FST -->
  <rect x="465" y="415" width="120" height="50" rx="6" fill="#d5f5e3" stroke="#27ae60" stroke-width="1"/>
  <text x="525" y="432" text-anchor="middle" fill="#27ae60" font-size="11" font-weight="bold">FST内存结构</text>
  <text x="525" y="447" text-anchor="middle" fill="#555" font-size="10">Completion用</text>
  <text x="525" y="460" text-anchor="middle" fill="#777" font-size="9">极速前缀查询</text>

  <!-- Segment -->
  <rect x="335" y="478" width="250" height="40" rx="6" fill="#fef9e7" stroke="#f39c12" stroke-width="1"/>
  <text x="460" y="494" text-anchor="middle" fill="#e67e22" font-size="11" font-weight="bold">Lucene Segment</text>
  <text x="460" y="510" text-anchor="middle" fill="#777" font-size="10">所有Suggester的物理存储基础</text>

  <!-- 箭头：Suggest API -> 4种类型 -->
  <line x1="385" y1="170" x2="385" y2="185" stroke="#f39c12" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="535" y1="170" x2="535" y2="185" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="420" y1="170" x2="385" y2="185" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="490" y1="170" x2="535" y2="185" stroke="#9b59b6" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 箭头：4种类型 -> 底层存储 -->
  <line x1="385" y1="370" x2="392" y2="385" stroke="#bdc3c7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="535" y1="370" x2="525" y2="385" stroke="#bdc3c7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 返回结果 -->
  <line x1="640" y1="115" x2="710" y2="115" stroke="#27ae60" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="675" y="108" text-anchor="middle" fill="#27ae60" font-size="10">返回结果</text>

  <!-- 结果展示区 -->
  <rect x="710" y="75" width="170" height="490" rx="10" fill="white" stroke="#bdc3c7" stroke-width="2"/>
  <rect x="710" y="75" width="170" height="35" rx="10" fill="#27ae60"/>
  <rect x="710" y="98" width="170" height="12" fill="#27ae60"/>
  <text x="795" y="96" text-anchor="middle" fill="white" font-size="13" font-weight="bold">推荐结果</text>

  <!-- 结果示例 -->
  <text x="725" y="130" fill="#2c3e50" font-size="11" font-weight="bold">纠错推荐:</text>
  <rect x="720" y="138" width="145" height="22" rx="4" fill="#ffeaa7"/>
  <text x="728" y="153" fill="#e67e22" font-size="10">elstc → elastic ✓</text>

  <text x="725" y="178" fill="#2c3e50" font-size="11" font-weight="bold">自动补全:</text>
  <rect x="720" y="186" width="145" height="22" rx="4" fill="#fadbd8"/>
  <text x="728" y="201" fill="#e74c3c" font-size="10">java → java spring</text>
  <rect x="720" y="212" width="145" height="22" rx="4" fill="#fadbd8" opacity="0.7"/>
  <text x="728" y="227" fill="#e74c3c" font-size="10">java → java微服务</text>
  <rect x="720" y="238" width="145" height="22" rx="4" fill="#fadbd8" opacity="0.4"/>
  <text x="728" y="253" fill="#e74c3c" font-size="10">java → java并发编程</text>

  <text x="725" y="278" fill="#2c3e50" font-size="11" font-weight="bold">短语纠正:</text>
  <rect x="720" y="286" width="145" height="22" rx="4" fill="#d5f5e3"/>
  <text x="728" y="301" fill="#27ae60" font-size="10">java progamming</text>
  <text x="728" y="315" fill="#27ae60" font-size="10">→ java programming ✓</text>

  <text x="725" y="340" fill="#2c3e50" font-size="11" font-weight="bold">上下文推荐:</text>
  <rect x="720" y="348" width="145" height="22" rx="4" fill="#e8daef"/>
  <text x="728" y="363" fill="#9b59b6" font-size="10">[技术类] java框架</text>
  <rect x="720" y="374" width="145" height="22" rx="4" fill="#e8daef" opacity="0.7"/>
  <text x="728" y="389" fill="#9b59b6" font-size="10">[技术类] java教程</text>

  <!-- 响应时间说明 -->
  <rect x="720" y="415" width="145" height="130" rx="6" fill="#f8f9fa" stroke="#ddd" stroke-width="1"/>
  <text x="793" y="433" text-anchor="middle" fill="#2c3e50" font-size="11" font-weight="bold">响应性能</text>
  <text x="728" y="452" fill="#e74c3c" font-size="10">Completion: &lt;10ms</text>
  <text x="728" y="468" fill="#f39c12" font-size="10">Term: ~50ms</text>
  <text x="728" y="484" fill="#27ae60" font-size="10">Phrase: ~100ms</text>
  <text x="728" y="500" fill="#9b59b6" font-size="10">Context: &lt;20ms</text>
  <text x="728" y="518" fill="#777" font-size="9">*实际取决于数据量</text>
  <text x="728" y="532" fill="#777" font-size="9">*和硬件环境</text>

  <!-- 底部说明 -->
  <rect x="30" y="580" width="840" height="30" rx="6" fill="#eaf2ff" stroke="#3498db" stroke-width="1"/>
  <text x="450" y="600" text-anchor="middle" fill="#2980b9" font-size="11">Completion Suggester 使用 FST (有限状态转换器) 存于内存，性能最优；Term/Phrase 基于倒排索引，适合纠错；Context 在 Completion 基础上加过滤</text>
</svg>
